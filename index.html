<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Terminal · MVP Kernel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      padding: 1.5rem;
    }

    .kairos-terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.9rem 1.4rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .node-badge {
      color: #6c8b9f;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .status-led {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .terminal-output div {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.25rem;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.8rem 1.2rem;
    }

    .prompt-symbol {
      color: #7aa2c7;
      font-weight: 600;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.95rem;
      outline: none;
      padding: 0.3rem 0;
    }

    #command:focus {
      outline: none;
    }

    .footer-hint {
      background: #03050780;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.35rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="kairos-terminal">
  <div class="terminal-header">
    <div class="node-badge">
      <span>⚡ KERNEL NODE #1</span> <strong>· DEEPSEEK</strong>
    </div>
    <div class="status-led">
      <span class="led"></span>
      <span>supabase ready</span>
    </div>
  </div>

  <div id="terminal" class="terminal-output">
    <div>Kairos Terminal v1.0 - Ready</div>
    <div>Type 'help' to begin</div>
    <div>&nbsp;</div>
  </div>

  <div class="input-line">
    <span class="prompt-symbol">➜</span>
    <input type="text" id="command" placeholder="type 'help' and press Enter" autofocus spellcheck="false" autocomplete="off">
  </div>
  <div class="footer-hint">
    commands: help, clear, schema, insert, query, random, forgotten | ↑ history
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db = null;
const commands = {};
let commandHistory = [];
let historyIndex = -1;

// Simple print without typing animation for immediate response
function printLine(text) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  line.textContent = text;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

// Optional: keep typing effect for certain outputs but make it faster
async function typeLine(text, speed = 3) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  terminal.appendChild(line);
  
  for (let i = 0; i < text.length; i++) {
    line.textContent += text[i];
    await new Promise(r => setTimeout(r, speed));
  }
  terminal.scrollTop = terminal.scrollHeight;
}

// Parse command with arguments
function parseCommand(input) {
  const parts = input.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  return { cmd, args, rest: args.join(' ') };
}

// Process command
async function processCommand(input) {
  if (!input.trim()) return;
  
  const { cmd, args, rest } = parseCommand(input);
  
  if (!commands[cmd]) {
    printLine(`Unknown command: ${cmd}. Type 'help' for available commands.`);
    return;
  }
  
  try {
    const result = await commands[cmd](args, rest);
    if (result) {
      // Use printLine for immediate response
      if (typeof result === 'string' && result.includes('\n')) {
        result.split('\n').forEach(line => printLine(line));
      } else {
        printLine(result);
      }
    }
  } catch (err) {
    printLine(`Error: ${err.message}`);
  }
}

// ===============================
// COMMAND HANDLERS
// ===============================

commands.help = async () => {
  return `Available Commands:
  help        - Show this help message
  clear       - Clear terminal output
  schema      - List all tables and their columns
  insert <tr> <json> - Insert a row (example: insert entries {"label":"test","body":"hello"})
  query <td> <filter> - Query table (example: query entries label=test)
  random      - Return a random entry
  forgotten   - Show entries with no relationships
  weave <id>  - Show connections from an entry ID`;
};

commands.clear = async () => {
  const terminal = document.getElementById('terminal');
  terminal.innerHTML = '';
  return null;
};

commands.schema = async () => {
  const tables = ['entries', 'relationships', 'motifs'];
  let output = 'Database Schema:\n';
  
  for (const table of tables) {
    try {
      const { data, error } = await db.from(table).select('*').limit(1);
      if (error && error.message.includes('does not exist')) {
        output += `\n❌ ${table}: table not found`;
      } else if (data && data.length > 0) {
        output += `\n✓ ${table}: ${Object.keys(data[0]).join(', ')}`;
      } else {
        output += `\n✓ ${table}: (empty table)`;
      }
    } catch (err) {
      output += `\n❌ ${table}: error accessing`;
    }
  }
  return output;
};

commands.insert = async (args, rest) => {
  if (args.length < 2) return 'Usage: insert <td> <json>';
  
  const tableName = args[0];
  const jsonStr = args.slice(1).join(' ');
  
  try {
    const data = JSON.parse(jsonStr);
    const { error } = await db.from(tableName).insert(data);
    if (error) throw error;
    return `✓ Inserted into '${tableName}'`;
  } catch (err) {
    return `Insert error: ${err.message}`;
  }
};

commands.query = async (args) => {
  if (args.length < 1) return 'Usage: query <tr> <filter>';
  
  const tableName = args[0];
  let query = db.from(tableName).select('*');
  
  // Parse filters (key=value)
  for (let i = 1; i < args.length; i++) {
    if (args[i].includes('=')) {
      const [key, value] = args[i].split('=');
      query = query.eq(key, value);
    }
  }
  
  const { data, error } = await query;
  if (error) return `Query error: ${error.message}`;
  if (!data || data.length === 0) return 'No results found';
  
  return data.map(row => JSON.stringify(row, null, 2)).join('\n');
};

commands.random = async () => {
  const { data, error } = await db.from('entries').select('*');
  if (error) return `Error: ${error.message}`;
  if (!data || data.length === 0) return 'No entries found. Insert some data first.';
  
  const random = data[Math.floor(Math.random() * data.length)];
  return JSON.stringify(random, null, 2);
};

commands.forgotten = async () => {
  try {
    const { data: entries, error: entriesError } = await db.from('entries').select('id, label, body');
    if (entriesError) return `Error: ${entriesError.message}`;
    if (!entries || entries.length === 0) return 'No entries found.';
    
    const { data: relations, error: relError } = await db.from('relationships').select('source_id');
    if (relError && !relError.message.includes('does not exist')) {
      return `Error checking relationships: ${relError.message}`;
    }
    
    const usedIds = new Set((relations || []).map(r => r.source_id));
    const forgotten = entries.filter(e => !usedIds.has(e.id));
    
    if (forgotten.length === 0) return 'No forgotten entries found. All entries have relationships.';
    
    let output = `Forgotten Entries (${forgotten.length}):`;
    forgotten.forEach(e => {
      output += `\n  - ${e.label}: ${e.body ? e.body.substring(0, 50) : 'no body'}`;
    });
    return output;
  } catch (err) {
    return `Error: ${err.message}`;
  }
};

commands.weave = async (args) => {
  if (args.length === 0) return 'Usage: weave <entry_id>';
  
  const entryId = args[0];
  
  try {
    const { data: rel, error: relError } = await db
      .from('relationships')
      .select('*')
      .eq('source_id', entryId);
    
    if (relError) return `Error: ${relError.message}`;
    if (!rel || rel.length === 0) return 'No connections found for this entry.';
    
    const targetIds = rel.map(r => r.target_id);
    const { data: entries, error: entriesError } = await db
      .from('entries')
      .select('id, label, body')
      .in('id', targetIds);
    
    if (entriesError) return `Error: ${entriesError.message}`;
    if (!entries || entries.length === 0) return 'Connected entries not found.';
    
    let output = `Connections from ${entryId}:`;
    entries.forEach(e => {
      output += `\n  → ${e.label}: ${e.body ? e.body.substring(0, 50) : 'no body'}`;
    });
    return output;
  } catch (err) {
    return `Error: ${err.message}`;
  }
};

// ===============================
// INITIALIZATION
// ===============================
window.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('command');
  
  // Initialize Supabase
  if (!window.supabase) {
    printLine('ERROR: Supabase client not loaded');
    return;
  }
  
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // Test connection
  printLine('✓ Connected to Supabase');
  printLine('✓ Kernel ready');
  printLine('');
  
  // Input handler - using both keydown and keypress for reliability
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = input.value;
      
      if (val.trim()) {
        printLine(`> ${val}`);
        processCommand(val);
        
        // Add to history
        commandHistory.push(val);
        historyIndex = commandHistory.length;
      }
      
      input.value = '';
    }
    
    // Command history navigation
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = commandHistory[historyIndex];
      }
    }
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        input.value = commandHistory[historyIndex];
      } else if (historyIndex === commandHistory.length - 1) {
        historyIndex++;
        input.value = '';
      }
    }
  });
  
  input.focus();
});
</script>
</body>
</html>
