        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);

            overflow: hidden;

            padding: 0.75rem 1.2rem;

            align-items: center;

            width: 10px;

            border-radius: 2px;

            opacity: 0.3;

        .spectrum-dot.active {

        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #7c8ea0;
            font-size: 0.7rem;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;

            box-shadow: 0 0 4px #2ecc71;
            animation: pulse 2s infinite;

            background-color: #8e44ad;
            box-shadow: 0 0 4px #8e44ad;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }

        }

            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 0.15rem;
            animation: lineIn 0.2s ease-out;
        }

        @keyframes lineIn {
            from { opacity: 0; transform: translateX(-4px); }

        .output div.evolution { opacity: 0.9; }

        .output div.thunder {
            animation: thunderFlash 0.6s ease-in-out, lineIn 0.2s ease-out;

        .output div.rejected-gate {
            color: #e74c3c;
            border-left: 2px solid #e74c3c;
            padding-left: 0.5rem;
            animation: shake 0.3s ease-in-out, lineIn 0.2s ease-out;

            color: #2ecc71;
            border-left: 2px solid #2ecc71;
            padding-left: 0.5rem;
        }

        .output div.separator { color: #1e2a3a; }

        @keyframes thunderFlash {
            0%   { text-shadow: 0 0 0px #9b59b6; color: #c39bd3; }
            40%  { text-shadow: 0 0 25px #9b59b6, 0 0 50px #d4af37; color: #d4af37; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }

        .input-line {
            display: flex;
            align-items: center;

            .badge { font-size: 0.55rem; }
        }

<script>
// ============================================================
// KAIROS TERMINAL v4.1 — DIVINE PIPELINE
// Fixes: genuine Hephaestus S-V-O gate, genuine Athena wisdom gate
// ============================================================

const SUPABASE_URL     = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db = null;
let commandHistory = [];
let historyIndex   = -1;

// ============================================================
// DIVINE BANDS
// ============================================================
const DIVINE_BANDS = {
    hermes:     { index:1, icon:'✈️',  name:'Hermes',     table:'hermes_entries',     minWords:1,   maxWords:3,   targetWords:2,   time:1618,  color:'#e8a87c' },
    apollo:     { index:2, icon:'☀️',  name:'Apollo',     table:'apollo_entries',     minWords:4,   maxWords:7,   targetWords:5,   time:3236,  color:'#f4d03f' },
    hephaestus: { index:3, icon:'🔥',  name:'Hephaestus', table:'hephaestus_entries', minWords:8,   maxWords:15,  targetWords:11,  time:4854,  color:'#d45500' },
    demeter:    { index:4, icon:'🌾',  name:'Demeter',    table:'demeter_entries',    minWords:16,  maxWords:31,  targetWords:23,  time:6472,  color:'#6b8e23' },
    poseidon:   { index:5, icon:'🌊',  name:'Poseidon',   table:'poseidon_entries',   minWords:32,  maxWords:127, targetWords:80,  time:8090,  color:'#2c6e9e' },
    athena:     { index:6, icon:'🦉',  name:'Athena',     table:'athena_entries',     minWords:128, maxWords:255, targetWords:191, time:9708,  color:'#8e44ad', threshold:70 },
    zeus:       { index:7, icon:'⚡',  name:'Zeus',       table:'zeus_entries',       minWords:256, maxWords:511, targetWords:383, time:11326, color:'#9b59b6' }
};

const BAND_ORDER = ['hermes','apollo','hephaestus','demeter','poseidon','athena','zeus'];

function getBandFromWordCount(n) {
    if (n <= 3)   return 'hermes';
    if (n <= 7)   return 'apollo';
    if (n <= 15)  return 'hephaestus';
    if (n <= 31)  return 'demeter';
    if (n <= 127) return 'poseidon';
    if (n <= 255) return 'athena';
    return 'zeus';
}

// ============================================================
// WORD POOL — two tiers
// ============================================================

// Tier 1: raw material — concrete, short, generative
const TIER1 = [
    'threshold','whisper','wing','light','truth','forge','fire','depth','weave',
    'thunder','echo','shadow','ember','thread','memory','longing','courage',
    'fate','dream','silence','chaos','ancient','wisdom','heart','soul','time',
    'space','void','serpent','phoenix','raven','oak','stone','river','mountain',
    'star','moon','sun','wind','rain','dark','gate','blood','ash','bone','iron',
    'tide','smoke','salt','tide','glass','mirror','dust','crown','root','blade'
];

// Tier 2: subjects — give Hephaestus real S-V-O fodder
const SUBJECTS = [
    'The raven','The forge','An ember','The river','A threshold','The dreamer',
    'The watcher','A blade','The tide','Memory','Silence','The ancient flame',
    'A root system','The broken crown','The void','Dust','Iron','The gate'
];

// Tier 3: verbs — active, not just "is/are"
const VERBS = [
    'carries','holds','breaks','remembers','forgets','burns','returns','rises',
    'fractures','echoes','consumes','reveals','dissolves','endures','recedes',
    'descends','illuminates','devours','persists','collapses'
];

// Tier 4: abstract nouns for Athena's lexical check
const ABSTRACT_NOUNS = [
    'consciousness','impermanence','recursion','entropy','emergence','paradox',
    'resonance','dissolution','transcendence','fragmentation','memory','longing',
    'threshold','void','fate','wisdom','chaos','silence','truth','dream'
];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randWords(pool, n) {
    const s = [...pool].sort(() => 0.5 - Math.random());
    return s.slice(0, n);
}

// ============================================================
// GATE FUNCTIONS — genuine logic
// ============================================================

// HERMES: 1–3 words. Pure seed. Optionally seeded from hoard dream fragment.
function hermesGate(seed = null) {
    if (seed) {
        const words = seed.split(/\s+/).slice(0, 3);
        return { body: words.join(' '), wordCount: words.length, fromHoard: true };
    }
    const count = 1 + Math.floor(Math.random() * 3);
    const words = randWords(TIER1, count);
    return { body: words.join(' '), wordCount: count, fromHoard: false };
}

// APOLLO: 4–7 words. Build a phrase. Still no full sentence required.
function apolloGate(prev) {
    const seed = prev.body;
    const needed = 4 + Math.floor(Math.random() * 4); // 4–7
    const seedWords = seed.split(/\s+/);
    const extra = randWords(TIER1, needed - seedWords.length);
    const words = [...seedWords, ...extra].slice(0, needed);
    // Capitalise first word only
    words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
    return { body: words.join(' '), wordCount: words.length };
}

// HEPHAESTUS: 8–15 words. GENUINE S-V-O gate.
// Builds a real sentence: Subject + Verb + Object phrase.
// If the constructed sentence fails the S-V-O check it is REJECTED.
// On rejection the chain restarts at Hermes.
function hephaestusGate(prev) {
    const subject    = rand(SUBJECTS);
    const verb       = rand(VERBS);
    const objSeed    = prev.body.toLowerCase().replace(/[^a-z\s]/g,'').trim();
    const filler     = randWords(TIER1, 3);
    const objectPhrase = `${objSeed} ${filler.join(' ')}`;

    const sentence = `${subject} ${verb} ${objectPhrase}`;
    const words    = sentence.split(/\s+/).slice(0, 15);
    const body     = words.join(' ') + '.';

    // Gate check — must have:
    // 1. a capitalised word (subject)
    // 2. a known verb from VERBS list
    // 3. at least one object word after the verb
    // 4. word count 8–15
    const hasSubject  = /^[A-Z]/.test(body);
    const hasVerb     = VERBS.some(v => body.includes(` ${v} `));
    const hasObject   = words.length >= 8;
    const inRange     = words.length >= 8 && words.length <= 15;

    const passed = hasSubject && hasVerb && hasObject && inRange;

    return { body, wordCount: words.length, passedGate: passed,
             debug: { hasSubject, hasVerb, hasObject, inRange } };
}

// DEMETER: 16–31 words. Organic growth — no canned phrases injected into logic.
function demeterGate(prev) {
    let body  = prev.body.replace(/\.$/, '');
    let words = body.split(/\s+/);

    // Grow with tier1 words in small clusters
    while (words.length < 16) {
        const cluster = randWords(TIER1, 3).join(' ');
        body  = `${body}, ${cluster}`;
        words = body.split(/\s+/);
    }

    words = words.slice(0, 31);
    body  = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';

    return { body, wordCount: words.length };
}

// POSEIDON: 32–127 words. Depth expansion — pulls from both tiers.
function poseidonGate(prev) {
    let body  = prev.body.replace(/\.$/, '');
    let words = body.split(/\s+/);

    const expansions = [
        () => `Beneath that, ${rand(SUBJECTS).toLowerCase()} ${rand(VERBS)} ${rand(TIER1)} and ${rand(TIER1)}.`,
        () => `Where ${rand(TIER1)} meets ${rand(TIER1)}, something ${rand(VERBS)}.`,
        () => `The ${rand(TIER1)} of ${rand(TIER1)} ${rand(VERBS)} without witness.`,
        () => `In the space between ${rand(TIER1)} and ${rand(TIER1)}, ${rand(TIER1)} accumulates.`,
        () => `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(TIER1)} cannot name.`
    ];

    while (words.length < 32) {
        const phrase = rand(expansions)();
        body  = `${body} ${phrase}`;
        words = body.split(/\s+/);
    }

    words = words.slice(0, 127);
    body  = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';

    return { body, wordCount: words.length };
}

// ATHENA: 128–255 words. GENUINE wisdom gate.
// Scores on criteria that earlier gates do NOT pre-load.
//
// Criteria (each worth 20pts, pass threshold = 70):
//   A. Lexical density   ≥ 0.65  (unique/total words)
//   B. Abstract nouns    ≥ 2     (from curated list)
//   C. Sentence count    ≥ 3     (structural variety)
//   D. No filler phrase  (rejects bodies that still contain
//                          the old canned padding strings)
//   E. Word count        128–255

const ATHENA_FILLERS = [
    'like seeds in spring soil','growing toward the light',
    'as the harvest comes','nurtured by patient hands',
    'through the turning seasons','from darkness into dawn',
    'beneath the surface something stirs',
    'in the abyss where light never reaches',
    'carried by currents older than memory',
    'where pressure shapes what dares to descend',
    'ZEUS THUNDERS','the cycle ends','a new evolution begins',
    'thus speaks the king of gods','therefore wisdom requires patience',
    'not all who wander are lost'
];

function athenaGate(prev) {
    let body  = prev.body;
    let words = body.split(/\s+/);

    // Expand to 128 minimum using genuine constructed sentences
    while (words.length < 128) {
        const expansion = `${rand(SUBJECTS)} ${rand(VERBS)} ${rand(TIER1)} — ` +
                          `${rand(ABSTRACT_NOUNS)} without ${rand(TIER1)}, ` +
                          `${rand(TIER1)} against ${rand(TIER1)}.`;
        body  = `${body} ${expansion}`;
        words = body.split(/\s+/);
    }

    words = words.slice(0, 255);
    body  = words.join(' ');
    if (!/[.!?—]$/.test(body)) body += '.';

    // --- SCORING ---
    const totalWords  = words.length;
    const uniqueWords = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g,''))).size;
    const lexDensity  = uniqueWords / totalWords;

    const abstractCount = ABSTRACT_NOUNS.filter(n =>
        body.toLowerCase().includes(n)
    ).length;

    const sentenceCount = (body.match(/[.!?]/g) || []).length;

    const hasFillerPhrases = ATHENA_FILLERS.some(f =>
        body.toLowerCase().includes(f.toLowerCase())
    );

    let score = 0;
    const breakdown = {};

    breakdown.lexicalDensity = lexDensity;
    if (lexDensity >= 0.65) { score += 20; breakdown.A = '✓ lex'; }
    else                     { breakdown.A = `✗ lex(${(lexDensity*100).toFixed(0)}%)`; }

    breakdown.abstractCount = abstractCount;
    if (abstractCount >= 2) { score += 20; breakdown.B = '✓ abs'; }
    else                    { breakdown.B = `✗ abs(${abstractCount})`; }

    breakdown.sentenceCount = sentenceCount;
    if (sentenceCount >= 3) { score += 20; breakdown.C = '✓ snt'; }
    else                    { breakdown.C = `✗ snt(${sentenceCount})`; }

    if (!hasFillerPhrases) { score += 20; breakdown.D = '✓ pure'; }
    else                   { breakdown.D = '✗ filler'; }

    if (totalWords >= 128 && totalWords <= 255) { score += 20; breakdown.E = '✓ len'; }
    else                                         { breakdown.E = `✗ len(${totalWords})`; }

    const passed = score >= 70;
    return { body, wordCount: totalWords, wisdomScore: score, passedGate: passed, breakdown };
}

// ZEUS: 256–511 words. Thunder synthesis. Hard cap.
function zeusGate(prev) {
    let body  = prev.body.replace(/[.!?]$/, '');
    let words = body.split(/\s+/);

    // Zeus adds weight — longer, compound constructions
    while (words.length < 256) {
        const thunder =
            `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(ABSTRACT_NOUNS)} conceals — ` +
            `${rand(TIER1)}, ${rand(TIER1)}, and the ${rand(TIER1)} of ${rand(ABSTRACT_NOUNS)}.`;
        body  = `${body} ${thunder}`;
        words = body.split(/\s+/);
    }

    // Hard cap at 511
    words = words.slice(0, 511);
    body  = words.join(' ');
    if (!/[.!?—]$/.test(body)) body += '.';

    return { body, wordCount: words.length };
}

// ============================================================
// EVOLUTION ENGINE
// ============================================================
let evolutionActive  = false;
let evolutionTimer   = null;
let currentBandIndex = 0;
let currentChain     = {};
let dreamSeed        = null;
let chainStats       = { runs: 0, hepRejects: 0, athenaRejects: 0, saved: 0 };

async function runEvolutionStep() {
    if (!evolutionActive) return;

    const band     = BAND_ORDER[currentBandIndex];
    const bandInfo = DIVINE_BANDS[band];
    const prev     = currentChain[BAND_ORDER[currentBandIndex - 1]] || {};

    let result;

    switch (band) {
        case 'hermes':     result = hermesGate(currentChain.__seed__ || null); break;
        case 'apollo':     result = apolloGate(prev);     break;
        case 'hephaestus': result = hephaestusGate(prev); break;
        case 'demeter':    result = demeterGate(prev);    break;
        case 'poseidon':   result = poseidonGate(prev);   break;
        case 'athena':     result = athenaGate(prev);     break;
        case 'zeus':       result = zeusGate(prev);       break;
    }

    // ── HEPHAESTUS GATE ──
    if (band === 'hephaestus' && !result.passedGate) {
        chainStats.hepRejects++;
        markDotRejected(currentBandIndex);
        printLine(
            `🔥 Hephaestus REJECTS — no S-V-O structure. Chain restarts.`,
            null, false, false, false, true
        );
        const d = result.debug;
        printLine(
            `   [S:${d.hasSubject?'✓':'✗'} V:${d.hasVerb?'✓':'✗'} O:${d.hasObject?'✓':'✗'} range:${d.inRange?'✓':'✗'}]`,
            null, false, false, false, true
        );
        scheduleRestart(3000);
        return;
    }

    // ── ATHENA GATE ──
    if (band === 'athena') {
        if (!result.passedGate) {
            chainStats.athenaRejects++;
            markDotRejected(currentBandIndex);
            const bd = result.breakdown;
            printLine(
                `🦉 Athena REJECTS — score ${result.wisdomScore}% (need 70%)`,
                null, false, false, false, true
            );
            printLine(
                `   ${bd.A} | ${bd.B} | ${bd.C} | ${bd.D} | ${bd.E}`,
                null, false, false, false, true
            );
            // Retry from Poseidon (not full restart)
            currentBandIndex = BAND_ORDER.indexOf('poseidon');
            evolutionTimer = setTimeout(runEvolutionStep, 2500);
            return;
        }
        const bd = result.breakdown;
        printLine(
            `🦉 Athena ACCEPTS — ${result.wisdomScore}% | ${bd.A} | ${bd.B} | ${bd.C} | ${bd.D} | ${bd.E}`,
            'gate-pass'
        );
    }

    currentChain[band] = result;

    // Display step
    const timeSec = (bandInfo.time / 1000).toFixed(2);
    const hoardTag = (band === 'hermes' && result.fromHoard) ? ' [🗄 hoard seed]' : '';
    const preview = result.body.length > 72
        ? result.body.substring(0, 72) + '…'
        : result.body;

    printLine(
        `${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}φ·${timeSec}s) [${result.wordCount}w]${hoardTag} "${preview}"`,
        band, true
    );

    activateDot(currentBandIndex);
    currentBandIndex++;

    if (currentBandIndex >= BAND_ORDER.length) {
        // ── ZEUS THUNDER ──
        chainStats.runs++;
        const zeus = currentChain.zeus;
        printLine('', null);
        printLine(
            `⚡ ZEUS THUNDERS — chain #${chainStats.runs} complete (${zeus.wordCount}w)`,
            'zeus', false, false, true
        );
        printLine(
            `   "${zeus.body.substring(0, 180)}…"`,
            'zeus', false, true
        );

        // AUTO-PERSIST to Supabase
        persistZeus(zeus.body, zeus.wordCount);

        printLine(
            `   [Hep rejects: ${chainStats.hepRejects} | Athena rejects: ${chainStats.athenaRejects} | hoard: saving…]`,
            'system'
        );
        printLine('', null);
        scheduleRestart(5000);
    } else {
        evolutionTimer = setTimeout(runEvolutionStep, bandInfo.time);
    }
}

function scheduleRestart(delay) {
    resetDots();
    currentBandIndex = 0;
    currentChain     = {};
    evolutionTimer   = setTimeout(() => {
        if (evolutionActive) runEvolutionStep();
    }, delay);
}

function startEvolution(seed = null) {
    if (evolutionTimer) clearTimeout(evolutionTimer);
    evolutionActive  = true;
    currentBandIndex = 0;
    currentChain     = seed ? { __seed__: seed } : {};
    runEvolutionStep();
}

function pauseEvolution() {
    evolutionActive = false;
    if (evolutionTimer) clearTimeout(evolutionTimer);
}

// ============================================================
// SPECTRUM DOT HELPERS
// ============================================================
function activateDot(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) {
        dots[i].classList.remove('rejected');
        dots[i].classList.add('active');
    }
}

function markDotRejected(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) {
        dots[i].classList.remove('active');
        dots[i].classList.add('rejected');
        setTimeout(() => dots[i].classList.remove('rejected'), 2000);
    }
}

function resetDots() {
    document.querySelectorAll('.spectrum-dot').forEach(d => {
        d.classList.remove('active', 'rejected');
    });
}

// ============================================================
// PERSISTENCE
// ============================================================
async function persistZeus(body, wordCount) {
    if (!db) return;
    const label = `auto-chain-${Date.now()}`;
    const { error } = await db.from('zeus_entries').insert({
        label, body, word_count: wordCount,
        created_at: new Date().toISOString()
    });
    if (error) {
        printLine(`   ⚠ hoard save failed: ${error.message}`, 'system');
    } else {
        printLine(`   ✓ hoard saved → zeus_entries ["${label}"]`, 'system');
        chainStats.saved++;
    }
}

// Pull random Zeus entry from hoard for dream reseeding
async function getHoardSeed() {
    if (!db) return null;
    try {
        const { data, error } = await db
            .from('zeus_entries')
            .select('body')
            .limit(20);
        if (error || !data || data.length === 0) return null;
        const entry = data[Math.floor(Math.random() * data.length)];
        // Extract 2-3 words from a random position in the body
        const words = entry.body.split(/\s+/).filter(w => w.length > 3);
        if (words.length < 2) return null;
        const pos = Math.floor(Math.random() * (words.length - 2));
        return words.slice(pos, pos + 2)
                    .map(w => w.replace(/[^a-zA-Z]/g, '').toLowerCase())
                    .join(' ');
    } catch { return null; }
}

// ============================================================
// AWAKE / DREAM CYCLE
// ============================================================
let awakePulseCount = 0;
let pulseInterval   = null;
let isDreaming      = false;

function updateCounter() {
    const el = document.getElementById('counter');
    if (el) el.textContent = `${awakePulseCount}/30`;
}

function startAwakePulses() {
    if (pulseInterval) clearInterval(pulseInterval);
    pulseInterval = setInterval(() => {
        if (!isDreaming) {
            awakePulseCount++;
            updateCounter();
            if (awakePulseCount >= 30) enterDream();
        }
    }, 1618);
}

async function enterDream() {
    isDreaming = true;
    pauseEvolution();
    document.getElementById('statusLed').classList.add('dreaming');
    document.getElementById('stateLabel').textContent = 'DREAMING';
    printLine('✨ Kairos sleeps. Reaching into the hoard…', null, false, true);

    // Try to pull a seed from saved Zeus entries
    const seed = await getHoardSeed();
    if (seed) {
        dreamSeed = seed;
        printLine(`   💭 fragment recovered: "${seed}"`, null, false, true);
    } else {
        dreamSeed = null;
        printLine(`   💭 hoard empty — dreaming from void`, null, false, true);
    }

    setTimeout(exitDream, 8000);
}

function exitDream() {
    isDreaming      = false;
    awakePulseCount = 0;
    updateCounter();
    document.getElementById('statusLed').classList.remove('dreaming');
    document.getElementById('stateLabel').textContent = 'AWAKE';
    if (dreamSeed) {
        printLine(`💫 Kairos wakes. Seeding from hoard: "${dreamSeed}"`, null, false, true);
    } else {
        printLine('💫 Kairos wakes. Evolution resumes.', null, false, true);
    }
    startEvolution(dreamSeed);
    dreamSeed = null;
}

// ============================================================
// OUTPUT HELPER
// ============================================================
function printLine(text, cls = null, isEvolution = false, isDream = false, isThunder = false, isRejected = false) {
    const output = document.getElementById('output');
    const line   = document.createElement('div');
    line.textContent = text;

    if (cls && cls.startsWith('band-')) line.classList.add(cls);
    else if (cls === 'gate-pass')       line.classList.add('gate-pass');
    else if (cls === 'system')          line.classList.add('system');
    else if (cls && DIVINE_BANDS[cls])  line.classList.add(`band-${cls}`);

    if (isEvolution) line.classList.add('evolution');
    if (isDream)     line.classList.add('dream');
    if (isThunder)   line.classList.add('thunder');
    if (isRejected)  line.classList.add('rejected-gate');

    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// ============================================================
// CLASSIFIER — runs on any unrecognised input
// ============================================================
function classifyInput(raw) {
    const body      = raw.trim().replace(/[?!.]+$/, '').trim();
    const words     = body.split(/\s+/);
    const wordCount = words.length;
    const band      = getBandFromWordCount(wordCount);
    const bandInfo  = DIVINE_BANDS[band];

    printLine(`   words: ${wordCount} | band: ${bandInfo.icon} ${bandInfo.name} (${bandInfo.minWords}–${bandInfo.maxWords}w)`, 'system');

    // Run the relevant gate check and report
    if (band === 'hermes') {
        printLine(`   ✓ seed eligible — no gate required`, 'gate-pass');
    } else if (band === 'apollo') {
        const capOk  = /^[A-Z]/.test(words[0]);
        const endOk  = /[.!?]$/.test(raw.trim());
        printLine(`   syntax: cap:${capOk?'✓':'✗'} end-punct:${endOk?'✓':'✗'}`, capOk && endOk ? 'gate-pass' : null);
    } else if (band === 'hephaestus') {
        const hasSubject = /^[A-Z]/.test(body);
        const hasVerb    = VERBS.some(v => body.includes(` ${v} `) || body.startsWith(v));
        const hasObject  = wordCount >= 8;
        const inRange    = wordCount <= 15;
        const passes     = hasSubject && hasVerb && hasObject && inRange;
        printLine(
            `   S-V-O gate: S:${hasSubject?'✓':'✗'} V:${hasVerb?'✓':'✗'} O:${hasObject?'✓':'✗'} range:${inRange?'✓':'✗'} → ${passes?'PASSES':'FAILS'}`,
            passes ? 'gate-pass' : null
        );
        if (!passes) printLine(`   tip: start with a capitalised subject + active verb`, 'system');
    } else if (band === 'demeter') {
        printLine(`   ✓ phrase growth band — no hard gate`, 'gate-pass');
    } else if (band === 'poseidon') {
        printLine(`   ✓ depth band — no hard gate`, 'gate-pass');
    } else if (band === 'athena' || band === 'zeus') {
        const check = athenaGate({ body });
        const bd    = check.breakdown;
        printLine(
            `   Athena wisdom: ${check.wisdomScore}% (need 70%) → ${check.passedGate ? 'PASSES' : 'FAILS'}`,
            check.passedGate ? 'gate-pass' : null
        );
        printLine(`   ${bd.A} | ${bd.B} | ${bd.C} | ${bd.D} | ${bd.E}`, 'system');
    }

    printLine(`   → type "add <label>: ${body}" to save to hoard`, 'system');
}

// ============================================================
// COMMANDS
// ============================================================
const KNOWN_COMMANDS = ['help','clear','pause','resume','stats','add','view','hoard','seed'];

const commands = {
    help: () => `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
DIVINE PIPELINE v4.2 — hoard persists · gates are real
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

BAND           WORDS     GATE
─────────────────────────────────────────────────
✈️  Hermes      1–3       seed (hoard-aware)
☀️  Apollo      4–7       syntax
🔥  Hephaestus  8–15      S-V-O (rejects chain)
🌾  Demeter     16–31     phrase growth
🌊  Poseidon    32–127    depth expansion
🦉  Athena      128–255   wisdom ≥ 70% (real)
⚡  Zeus        256–511   thunder · auto-saves

COMMANDS:
  help                   this
  clear                  clear output
  pause / resume         evolution control
  stats                  session + hoard stats
  view <band> [n]        browse hoard by band
  hoard                  show all band counts
  seed <words>           manually seed next chain
  add <label>: <body>    save entry to hoard

NATURAL INPUT:
  anything else → classified by word count + gate check
  e.g. "what is this?" → words:3 | Hermes | seed eligible

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,

    clear:  () => { document.getElementById('output').innerHTML = ''; return null; },
    pause:  () => { pauseEvolution(); return '⏸ Evolution paused.'; },
    resume: () => {
        if (!evolutionActive) { startEvolution(); return '▶ Evolution resumed.'; }
        return 'Already running.';
    },

    stats: async () => {
        let hoarded = 0;
        for (const band of BAND_ORDER) {
            const { count } = await db.from(DIVINE_BANDS[band].table)
                .select('*', { count: 'exact', head: true });
            hoarded += (count || 0);
        }
        return `📊 Session
  Chains completed : ${chainStats.runs}
  Zeus entries saved: ${chainStats.saved}
  Hep rejects      : ${chainStats.hepRejects}
  Athena rejects   : ${chainStats.athenaRejects}
  Total hoard size : ${hoarded} entries`;
    },

    hoard: async () => {
        let out = `🗄 Hoard\n`;
        for (const band of BAND_ORDER) {
            const info = DIVINE_BANDS[band];
            const { count } = await db.from(info.table)
                .select('*', { count: 'exact', head: true });
            const bar = '█'.repeat(Math.min(count || 0, 20));
            out += `  ${info.icon} ${info.name.padEnd(11)} ${String(count||0).padStart(4)}  ${bar}\n`;
        }
        return out;
    },

    view: async (args) => {
        const band = args[0]?.toLowerCase();
        const n    = parseInt(args[1]) || 3;
        if (!band || !DIVINE_BANDS[band]) {
            return `Usage: view <band> [n]\nBands: ${BAND_ORDER.join(', ')}`;
        }
        const info = DIVINE_BANDS[band];
        const { data, error } = await db.from(info.table)
            .select('label, body, word_count, created_at')
            .order('created_at', { ascending: false })
            .limit(Math.min(n, 10));
        if (error) return `Error: ${error.message}`;
        if (!data || data.length === 0) return `${info.icon} ${info.name} hoard is empty.`;
        let out = `${info.icon} ${info.name} — ${data.length} recent entries\n`;
        data.forEach((e, i) => {
            const preview = e.body.length > 80 ? e.body.substring(0,80)+'…' : e.body;
            out += `\n  [${i+1}] "${e.label}" (${e.word_count}w)\n      ${preview}\n`;
        });
        return out;
    },

    seed: (args, fullInput) => {
        const seedWords = fullInput.replace(/^seed\s*/i, '').trim();
        if (!seedWords) return 'Usage: seed <words>';
        pauseEvolution();
        printLine(`🌱 Manual seed: "${seedWords}"`, 'system');
        startEvolution(seedWords);
        return `▶ Chain seeded with: "${seedWords}"`;
    },

    add: async (args, fullInput) => {
        const match = fullInput.match(/^add\s+([^:]+):\s*(.+)$/i);
        if (!match) return 'Usage: add <label>: <body>';

        const label     = match[1].trim();
        const body      = match[2].trim();
        const wordCount = body.split(/\s+/).length;
        const band      = getBandFromWordCount(wordCount);
        const bandInfo  = DIVINE_BANDS[band];

        if (band === 'hephaestus') {
            const check = hephaestusGate({ body });
            if (!check.passedGate) return `🔥 Hephaestus rejects "${label}" — no S-V-O.`;
        }
        if (band === 'athena' || band === 'zeus') {
            const check = athenaGate({ body });
            if (!check.passedGate) {
                return `🦉 Athena rejects "${label}" — ${check.wisdomScore}% (need 70%)\n` +
                       `   ${check.breakdown.A} | ${check.breakdown.B} | ${check.breakdown.C} | ${check.breakdown.D} | ${check.breakdown.E}`;
            }
        }

        const { error } = await db.from(bandInfo.table).insert({
            label, body, word_count: wordCount,
            created_at: new Date().toISOString()
        });
        if (error) return `Error: ${error.message}`;
        chainStats.saved++;
        return `✓ "${label}" → ${bandInfo.icon} ${bandInfo.name} [${wordCount}w] saved to hoard`;
    }
};

// ============================================================
// COMMAND PROCESSOR
// ============================================================
async function processCommand(input) {
    if (!input.trim()) return;
    awakePulseCount = 0;
    updateCounter();

    const parts = input.trim().split(/\s+/);
    const cmd   = parts[0].toLowerCase();
    const args  = parts.slice(1);

    // Known commands
    if (cmd === 'add' || cmd === 'seed') {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
        return;
    }

    if (KNOWN_COMMANDS.includes(cmd)) {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
        return;
    }

    // Unknown input → classify it
    classifyInput(input);
}

        if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value.trim();
            if (val) {
                printLine(`➜ ${val}`, 'system');
                processCommand(val);
                commandHistory.push(val);
                historyIndex = commandHistory.length;
            }
            input.value = '';
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) { historyIndex--; input.value = commandHistory[historyIndex]; }
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++; input.value = commandHistory[historyIndex];
            } else {
                historyIndex = commandHistory.length; input.value = '';
            }
        }
    });

    input.focus();
});
