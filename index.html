<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kairos Terminal · MVP Kernel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      padding: 1.5rem;
    }

    .kairos-terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.02);
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.9rem 1.4rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }

    .node-badge {
      color: #6c8b9f;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .node-badge strong {
      color: #b7d0e5;
      font-weight: 600;
    }

    .status-led {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.2rem 0.8rem 1.2rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .terminal-output div {
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 2px solid transparent;
      padding-left: 0.6rem;
      margin-bottom: 0.25rem;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.8rem 1.2rem;
      font-family: monospace;
      font-size: 0.95rem;
    }

    .prompt-symbol {
      color: #7aa2c7;
      font-weight: 600;
      font-size: 1rem;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      padding: 0.3rem 0;
      caret-color: #9bb8da;
    }

    #command:focus {
      outline: none;
    }

    .terminal-output::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-output::-webkit-scrollbar-track {
      background: #0e121c;
    }

    .terminal-output::-webkit-scrollbar-thumb {
      background: #2c3548;
      border-radius: 8px;
    }

    .footer-hint {
      background: #03050780;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.35rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="kairos-terminal">
  <div class="terminal-header">
    <div class="node-badge">
      <span>⚡ KERNEL NODE #1</span> <strong>· DEEPSEEK PRODUCTION</strong>
    </div>
    <div class="status-led">
      <span class="led"></span>
      <span>supabase · ready</span>
    </div>
  </div>

  <div id="terminal" class="terminal-output">
    <!-- terminal output appears here -->
  </div>

  <div class="input-line">
    <span class="prompt-symbol">➜</span>
    <input type="text" id="command" placeholder="type 'help' and press Enter" autofocus spellcheck="false" autocomplete="off">
  </div>
  <div class="footer-hint">
    KAIROS TERMINAL | commands: help, clear, schema, insert, query, random, forgotten
  </div>
</div>

<script>
  // ============================================================
  // KAIROS TERMINAL KERNEL - PRODUCTION NODE
  // ============================================================
  
  // !!! REPLACE WITH YOUR SUPABASE CREDENTIALS !!!
  const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
  
  let supabase = null;
  const commands = {};
  
  // Terminal output function
  function printToTerminal(text) {
    const terminalDiv = document.getElementById('terminal');
    if (!terminalDiv) return;
    const line = document.createElement('div');
    line.textContent = String(text);
    terminalDiv.appendChild(line);
    terminalDiv.scrollTop = terminalDiv.scrollHeight;
  }
  
  // Process commands
  async function processCommand(cmdLine) {
    const parts = cmdLine.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    
    if (commands[cmd]) {
      try {
        const output = await commands[cmd](args);
        if (output !== undefined && output !== null) {
          printToTerminal(String(output));
        }
      } catch (err) {
        printToTerminal(`Error: ${err.message}`);
      }
    } else if (cmdLine.trim().length > 0) {
      printToTerminal(`Unknown command: "${cmd}". Type "help" for available commands.`);
    }
  }
  
  // Database bootstrap
  async function bootstrapDatabase() {
    const tables = ['entries', 'relationships', 'motifs'];
    
    for (const table of tables) {
      try {
        const { error } = await supabase.from(table).select('count', { count: 'exact', head: true });
        if (error && error.message && error.message.includes('does not exist')) {
          printToTerminal(`⚠️ Table '${table}' missing. Please create it in Supabase SQL editor.`);
        }
      } catch (err) {
        // Table doesn't exist
        printToTerminal(`⚠️ Table '${table}' not found. Run SQL creation script.`);
      }
    }
  }
  
  // ========== COMMAND HANDLERS ==========
  
  commands.help = async () => {
    return `Available commands:
  help        - Show this help message
  clear       - Clear terminal output
  schema      - List existing tables and columns
  insert <table> <json> - Insert a row (example: insert entries {"label":"test","body":"hello"})
  query <td> <filter> - Query table (example: query entries label=test)
  random      - Return a random row from entries
  forgotten   - Return entries with no relationships`;
  };
  
  commands.clear = async () => {
    const terminalDiv = document.getElementById('terminal');
    if (terminalDiv) terminalDiv.innerHTML = '';
    return null;
  };
  
  commands.schema = async () => {
    const tables = ['entries', 'relationships', 'motifs'];
    let output = 'Database Schema:\n';
    
    for (const table of tables) {
      try {
        const { data, error } = await supabase.from(table).select('*').limit(1);
        if (error && error.message.includes('does not exist')) {
          output += `\n❌ ${table}: not found`;
        } else if (data && data.length > 0) {
          const columns = Object.keys(data[0]);
          output += `\n📁 ${table}: ${columns.join(', ')}`;
        } else {
          output += `\n📁 ${table}: (empty table)`;
        }
      } catch (err) {
        output += `\n❌ ${table}: error accessing`;
      }
    }
    return output;
  };
  
  commands.insert = async (args) => {
    if (args.length < 2) return 'Usage: insert </table> <json> (example: insert entries {"label":"test","body":"content"})';
    
    const tableName = args[0];
    const jsonStr = args.slice(1).join(' ');
    
    try {
      const data = JSON.parse(jsonStr);
      const { error } = await supabase.from(tableName).insert(data);
      if (error) throw error;
      return `✓ Inserted into '${tableName}'.`;
    } catch (err) {
      return `Insert error: ${err.message}`;
    }
  };
  
  commands.query = async (args) => {
    if (args.length < 1) return 'Usage: query <tr> <filter> (example: query entries label=test)';
    
    const tableName = args[0];
    let query = supabase.from(tableName).select('*');
    
    if (args.length >= 2 && args[1].includes('=')) {
      const [key, value] = args[1].split('=');
      query = query.eq(key, value);
    }
    
    const { data, error } = await query;
    if (error) return `Query error: ${error.message}`;
    if (!data || data.length === 0) return 'No results found.';
    
    return data.map(row => JSON.stringify(row, null, 2)).join('\n');
  };
  
  commands.random = async () => {
    const { data, error } = await supabase.from('entries').select('*');
    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return 'No entries found. Insert some data first.';
    
    const random = data[Math.floor(Math.random() * data.length)];
    return `Random Entry:\n${JSON.stringify(random, null, 2)}`;
  };
  
  commands.forgotten = async () => {
    try {
      const { data: entries, error: entriesError } = await supabase.from('entries').select('id, label, body');
      if (entriesError) return `Error: ${entriesError.message}`;
      if (!entries || entries.length === 0) return 'No entries found.';
      
      const { data: relations, error: relError } = await supabase.from('relationships').select('source_id');
      if (relError && !relError.message.includes('does not exist')) {
        return `Error checking relationships: ${relError.message}`;
      }
      
      const usedIds = new Set((relations || []).map(r => r.source_id));
      const forgotten = entries.filter(e => !usedIds.has(e.id));
      
      if (forgotten.length === 0) return 'No forgotten entries found. All entries have relationships.';
      return `Forgotten Entries (${forgotten.length}):\n${forgotten.map(e => `- ${e.label}: ${e.body || 'no body'}`).join('\n')}`;
    } catch (err) {
      return `Error: ${err.message}`;
    }
  };
  
  // ========== INITIALIZATION ==========
  (async function init() {
    // Check if Supabase loaded
    if (!window.supabase) {
      printToTerminal("ERROR: Supabase client failed to load. Check internet connection.");
      return;
    }
    
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    printToTerminal("Kairos Terminal v1.0 - Connected to Supabase");
    
    await bootstrapDatabase();
    printToTerminal('Type "help" for available commands.\n');
    
    // Set up input handler
    const commandInput = document.getElementById('command');
    if (commandInput) {
      commandInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const cmdLine = commandInput.value;
          if (cmdLine.trim()) {
            printToTerminal(`> ${cmdLine}`);
            processCommand(cmdLine);
          }
          commandInput.value = '';
          e.preventDefault();
        }
      });
      commandInput.focus();
    }
  })();
</script>
</body>
</html>
