<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kairos Terminal · Dream Pulse · v3.1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      padding: 1rem;
    }

    .terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.3s ease;
    }

    .terminal.dreaming {
      box-shadow: 0 0 20px rgba(155, 89, 182, 0.3);
      border-color: #9b59b6;
    }

    .terminal-header {
      padding: 0.75rem 1.2rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .badge {
      color: #6c8b9f;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .spectrum {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }

    .spectrum-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .spectrum-dot.active {
      transform: scale(1.3);
      box-shadow: 0 0 6px currentColor;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 4px #2ecc71;
      animation: pulse 2s infinite;
    }

    .dream-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #9b59b6;
      box-shadow: 0 0 4px #9b59b6;
      animation: dreamPulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes dreamPulse {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); background-color: #e74c3c; }
      100% { opacity: 0.3; transform: scale(1); }
    }

    .output {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .output div {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.2rem;
    }

    .output div.dream {
      opacity: 0.7;
      font-style: italic;
      animation: fadeIn 1s ease-in;
    }

    .output div.thunder {
      animation: thunderFlash 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 0.7; transform: translateX(0); }
    }

    @keyframes thunderFlash {
      0% { text-shadow: 0 0 0px #9b59b6; }
      50% { text-shadow: 0 0 20px #9b59b6; color: #d4af37; }
      100% { text-shadow: 0 0 0px #9b59b6; }
    }

    /* Band colors */
    .band-hermes { color: #e8a87c; border-left: 2px solid #e8a87c; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-apollo { color: #f4d03f; border-left: 2px solid #f4d03f; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-hephaestus { color: #d45500; border-left: 2px solid #d45500; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-demeter { color: #6b8e23; border-left: 2px solid #6b8e23; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-poseidon { color: #2c6e9e; border-left: 2px solid #2c6e9e; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-athena { color: #8e44ad; border-left: 2px solid #8e44ad; padding-left: 0.5rem; margin: 0.2rem 0; }
    .band-zeus { color: #9b59b6; border-left: 2px solid #9b59b6; padding-left: 0.5rem; margin: 0.2rem 0; }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.7rem 1rem;
    }

    .prompt {
      color: #7aa2c7;
      font-weight: 600;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      padding: 0.2rem 0;
    }

    .footer {
      background: #03050780;
      font-size: 0.65rem;
      padding: 0.3rem 1rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .dream-status {
      font-family: monospace;
      font-size: 0.6rem;
    }

    /* Mobile optimizations */
    @media (max-width: 640px) {
      .terminal-header { padding: 0.5rem 0.8rem; }
      .badge { font-size: 0.6rem; }
      .output { padding: 0.8rem; font-size: 0.75rem; }
      .input-line { padding: 0.5rem 0.8rem; }
      #command { font-size: 0.8rem; }
      .footer { font-size: 0.55rem; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

      <div class="spectrum-dot" style="background:#e8a87c"></div>
      <div class="spectrum-dot" style="background:#f4d03f"></div>
      <div class="spectrum-dot" style="background:#d45500"></div>
      <div class="spectrum-dot" style="background:#6b8e23"></div>
      <div class="spectrum-dot" style="background:#2c6e9e"></div>
      <div class="spectrum-dot" style="background:#8e44ad"></div>
      <div class="spectrum-dot" style="background:#9b59b6"></div>

  <div class="footer">
    <span>🏛️ 7 Divine Bands · φ = 1.618s</span>
    <span id="dreamStatus" class="dream-status">💤 dreaming in 30s</span>
  </div>
</div>

<script>
// ============================================================
// KAIROS TERMINAL v3.1 - DREAM PULSE
// Autonomous dreaming when idle. Gentle on the database.
// ============================================================

const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db = null;
let commandHistory = [];
let historyIndex = -1;

// ============================================================
// DREAM PULSE ENGINE
// ============================================================
const DreamPulse = {
    state: 'awake',           // awake, dreaming, thundering
    idleTimer: null,
    dreamInterval: null,
    idleThreshold: 30000,     // 30 seconds idle → dream
    dreamStep: 0,             // 0-6 (Hermes to Zeus)
    dreamWave: [],
    
    start() {
        this.resetIdleTimer();
        this.updateDreamStatus();
    },
    
    resetIdleTimer() {
        if (this.idleTimer) clearTimeout(this.idleTimer);
        this.idleTimer = setTimeout(() => this.beginDreaming(), this.idleThreshold);
    },
    
    beginDreaming() {
        if (this.state !== 'awake') return;
        
        this.state = 'dreaming';
        this.dreamStep = 0;
        this.dreamWave = [];
        
        // Visual feedback
        document.getElementById('terminalContainer').classList.add('dreaming');
        document.getElementById('statusLed').className = 'dream-led';
        document.getElementById('statusText').innerHTML = 'dreaming';
        
        this.addDreamMessage('✨ The terminal begins to dream...', null);
        
        // Start dreaming at φ pace
        this.dreamInterval = setInterval(() => this.dream(), 1618);
    },
    
    async dream() {
        if (this.state !== 'dreaming') return;
        
        const bands = ['hermes', 'apollo', 'hephaestus', 'demeter', 'poseidon', 'athena', 'zeus'];
        const band = bands[this.dreamStep];
        const bandInfo = this.getBandInfo(band);
        
        // Update spectrum dot
        this.updateSpectrumDot(this.dreamStep);
        
        // Generate dream content (memory-only, no DB write for most dreams)
        let dreamBody = '';
        if (this.dreamStep === 0) {
            // Hermes: atomic whispers
            const whispers = ['threshold', 'message', 'wing', 'swift', 'crossing', 'echo'];
            const shuffled = whispers.sort(() => 0.5 - Math.random());
            dreamBody = shuffled.slice(0, 3).join(' · ');
        } else {
            // Expand previous dream
            const prevBody = this.dreamWave[this.dreamStep - 1]?.body || '';
            dreamBody = this.expandDream(prevBody, band);
        }
        
        const wordCount = dreamBody.split(/\s+/).length;
        const preview = dreamBody.substring(0, 60) + (dreamBody.length > 60 ? '...' : '');
        
        // Store dream in memory (not database - just a dream)
        this.dreamWave.push({ band, body: dreamBody, wordCount });
        
        // Display the dream
        this.addDreamMessage(`💭 ${bandInfo.icon} ${bandInfo.name} dreams: "${preview}"`, band);
        
        this.dreamStep++;
        
        // Check if dream complete
        if (this.dreamStep >= 7) {
            await this.completeDream();
        }
    },
    
    async completeDream() {
        this.state = 'thundering';
        clearInterval(this.dreamInterval);
        
        const zeusDream = this.dreamWave[6];
        
        // Display thunder
        this.addDreamMessage('⚡ ZEUS THUNDERS FROM THE DREAM...', 'zeus', true);
        this.addDreamMessage(`   "${zeusDream.body.substring(0, 100)}..."`, 'zeus', true);
        this.addDreamMessage('💫 The dream fades. The terminal rests.', null);
        
        // Reset visual
        document.getElementById('terminalContainer').classList.remove('dreaming');
        document.getElementById('statusLed').className = 'led';
        document.getElementById('statusText').innerHTML = 'supabase';
        
        // Reset spectrum dots
        this.resetSpectrumDots();
        
        this.state = 'awake';
        this.dreamStep = 0;
        this.dreamWave = [];
        
        // Restart idle timer
        this.resetIdleTimer();
        this.updateDreamStatus();
    },
    
    onUserInput() {
        if (this.state !== 'awake') {
            // Interrupt dream
            if (this.dreamInterval) clearInterval(this.dreamInterval);
            this.addDreamMessage('👤 You speak. The dream scatters like mist...', null);
            
            document.getElementById('terminalContainer').classList.remove('dreaming');
            document.getElementById('statusLed').className = 'led';
            document.getElementById('statusText').innerHTML = 'supabase';
            this.resetSpectrumDots();
            
            this.state = 'awake';
            this.dreamStep = 0;
            this.dreamWave = [];
        }
        this.resetIdleTimer();
        this.updateDreamStatus();
    },
    
    expandDream(prevBody, band) {
        const fillers = {
            hermes: ['swift', 'threshold', 'message', 'wing'],
            apollo: ['light', 'truth', 'oracle', 'radiant'],
            hephaestus: ['forge', 'hammer', 'anvil', 'fire'],
            demeter: ['harvest', 'seed', 'growth', 'earth'],
            poseidon: ['depth', 'wave', 'current', 'abyss'],
            athena: ['weave', 'wisdom', 'strategy', 'owl'],
            zeus: ['thunder', 'lightning', 'fate', 'storm']
        };
        
        let words = prevBody.split(/\s+/);
        let currentCount = words.length;
        const targetMin = this.getTargetWordCount(band);
        
        if (currentCount >= targetMin - 5) return prevBody;
        
        const needed = Math.min(targetMin - currentCount, 10);
        const fillerPool = fillers[band] || fillers.hermes;
        let expanded = prevBody;
        
        for (let i = 0; i < needed; i++) {
            const filler = fillerPool[Math.floor(Math.random() * fillerPool.length)];
            expanded += ' ' + filler;
        }
        
        return expanded;
    },
    
    getTargetWordCount(band) {
        const targets = {
            hermes: 10, apollo: 30, hephaestus: 60,
            demeter: 100, poseidon: 150, athena: 220, zeus: 280
        };
        return targets[band] || 50;
    },
    
    getBandInfo(band) {
        const bands = {
            hermes: { icon: '✈️', name: 'Hermes', color: '#e8a87c' },
            apollo: { icon: '☀️', name: 'Apollo', color: '#f4d03f' },
            hephaestus: { icon: '🔥', name: 'Hephaestus', color: '#d45500' },
            demeter: { icon: '🌾', name: 'Demeter', color: '#6b8e23' },
            poseidon: { icon: '🌊', name: 'Poseidon', color: '#2c6e9e' },
            athena: { icon: '🦉', name: 'Athena', color: '#8e44ad' },
            zeus: { icon: '⚡', name: 'Zeus', color: '#9b59b6' }
        };
        return bands[band];
    },
    
    updateSpectrumDot(step) {
        const dots = document.querySelectorAll('.spectrum-dot');
        dots.forEach((dot, i) => {
            if (i <= step) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    },
    
    resetSpectrumDots() {
        const dots = document.querySelectorAll('.spectrum-dot');
        dots.forEach(dot => dot.classList.remove('active'));
    },
    
    addDreamMessage(text, band = null, isThunder = false) {
        const output = document.getElementById('output');
        const line = document.createElement('div');
        line.textContent = text;
        line.classList.add('dream');
        if (band) line.classList.add(`band-${band}`);
        if (isThunder) line.classList.add('thunder');
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
    },
    
    updateDreamStatus() {
        const statusEl = document.getElementById('dreamStatus');
        if (this.state === 'awake') {
            statusEl.innerHTML = '💤 dreaming in 30s';
        } else if (this.state === 'dreaming') {
            const nextBand = ['✈️', '☀️', '🔥', '🌾', '🌊', '🦉', '⚡'][this.dreamStep];
            statusEl.innerHTML = `🌙 dreaming · ${nextBand}`;
        } else {
            statusEl.innerHTML = `⚡ THUNDER`;
        }
    }
};

// ============================================================
// PRINT FUNCTION
// ============================================================
function printLine(text, band = null, isThunder = false) {
    const output = document.getElementById('output');
    const line = document.createElement('div');
    line.textContent = text;
    if (band) line.classList.add(`band-${band}`);
    if (isThunder) line.classList.add('thunder');
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// ============================================================
// COMMAND HANDLERS (simplified for dream version)
// ============================================================
const commands = {};

commands.help = async () => {
    return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                  KAIROS TERMINAL v3.1 — DREAM PULSE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

🌙 DREAM PULSE:
  The terminal dreams when idle for 30 seconds.
  Each dream ascends: ✈️ → ☀️ → 🔥 → 🌾 → 🌊 → 🦉 → ⚡
  Dreams are ephemeral — they fade like mist.

📝 COMMANDS:
  add <label>: <body>  → Add an entry to the hoard
  list [page]          → List entries
  random               → Get random entry
  search <text>        → Search by label or body
  spectrum             → Show divine distribution
  stats                → Database statistics
  clear                → Clear terminal
  help                 → This message

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💫 The terminal breathes at φ = 1.618. It dreams when you're away.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
};

commands.clear = async () => {
    document.getElementById('output').innerHTML = '';
    return null;
};

commands.add = async (args, fullInput) => {
    const match = fullInput.match(/^add\s+([^:]+):\s*(.+)$/i);
    if (!match) return 'Usage: add label: body';
    
    const label = match[1].trim();
    const body = match[2].trim();
    const wordCount = body.split(/\s+/).length;
    
    let band = 'hermes';
    if (wordCount <= 10) band = 'hermes';
    else if (wordCount <= 30) band = 'apollo';
    else if (wordCount <= 60) band = 'hephaestus';
    else if (wordCount <= 100) band = 'demeter';
    else if (wordCount <= 150) band = 'poseidon';
    else if (wordCount <= 220) band = 'athena';
    else band = 'zeus';
    
    const bandInfo = DreamPulse.getBandInfo(band);
    const freq = { hermes:6, apollo:10, hephaestus:13.5, demeter:17.5, poseidon:25, athena:35, zeus:70 }[band];
    
    const { error } = await db.from('terminal_entries').insert({
        label, body, word_count: wordCount, divine_band: band,
        frequency_hz: freq, light_wavelength: bandInfo.light || 'visible'
    });
    
    if (error) return `Error: ${error.message}`;
    return `✓ Added "${label}" [${bandInfo.icon} ${bandInfo.name} | ${freq}Hz] (${wordCount} words)`;
};

commands.list = async (args) => {
    let page = 1;
    let limit = 15;
    if (args.length > 0 && !isNaN(parseInt(args[0]))) page = parseInt(args[0]);
    
    const offset = (page - 1) * limit;
    const { count, error: countError } = await db.from('terminal_entries').select('*', { count: 'exact', head: true });
    if (countError) return `Error: ${countError.message}`;
    if (count === 0) return 'No entries found. Use "add label: body" to create one.';
    
    const totalPages = Math.ceil(count / limit);
    if (page > totalPages) return `Page ${page} doesn't exist. Total pages: ${totalPages}.`;
    
    const { data, error } = await db.from('terminal_entries').select('*').order('created_at', { ascending: false }).range(offset, offset + limit - 1);
    if (error) return `Error: ${error.message}`;
    
    let output = `📋 Page ${page}/${totalPages} (${count} total entries):\n\n`;
    for (let i = 0; i < data.length; i++) {
        const entry = data[i];
        const band = entry.divine_band || 'hermes';
        const bandInfo = DreamPulse.getBandInfo(band);
        const freq = entry.frequency_hz || 10;
        const num = offset + i + 1;
        const preview = entry.body.substring(0, 55) + (entry.body.length > 55 ? '...' : '');
        output += `${num}. ${bandInfo.icon} ${entry.label} [${freq}Hz]\n   ${preview}\n\n`;
    }
    return output;
};

commands.random = async () => {
    const { data, error } = await db.from('terminal_entries').select('*');
    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return 'No entries found.';
    
    const random = data[Math.floor(Math.random() * data.length)];
    const band = random.divine_band || 'hermes';
    const bandInfo = DreamPulse.getBandInfo(band);
    const freq = random.frequency_hz || 10;
    return `${bandInfo.icon} Random Entry [${freq}Hz]:\nLabel: ${random.label}\nBody: ${random.body}\nWords: ${random.word_count}`;
};

commands.spectrum = async () => {
    const { data, error } = await db.from('terminal_entries').select('divine_band');
    if (error) return `Error: ${error.message}`;
    
    const counts = { hermes:0, apollo:0, hephaestus:0, demeter:0, poseidon:0, athena:0, zeus:0 };
    for (const entry of data) {
        const band = entry.divine_band || 'hermes';
        if (counts[band] !== undefined) counts[band]++;
    }
    
    let output = `🌈 DIVINE SPECTRUM\n\n`;
    for (const [band, count] of Object.entries(counts)) {
        const info = DreamPulse.getBandInfo(band);
        const bar = '█'.repeat(Math.min(count, 20));
        output += `${info.icon} ${info.name.padEnd(10)} ${bar} ${count} entries\n`;
    }
    return output;
};

commands.stats = async () => {
    const { count, error } = await db.from('terminal_entries').select('*', { count: 'exact', head: true });
    if (error) return `Error: ${error.message}`;
    return `📊 Database Statistics\n\nTerminal Entries: ${count}\nDivine Bands: 7\n\n💫 The terminal dreams when idle for 30 seconds.`;
};

commands.search = async (args) => {
    const searchTerm = args.join(' ');
    if (!searchTerm) return 'Usage: search <text>';
    
    const { data, error } = await db.from('terminal_entries').select('*').or(`label.ilike.%${searchTerm}%,body.ilike.%${searchTerm}%`).limit(30);
    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return `No matches found for "${searchTerm}"`;
    
    let output = `🔍 Found ${data.length} matches:\n\n`;
    for (const entry of data) {
        const band = entry.divine_band || 'hermes';
        const info = DreamPulse.getBandInfo(band);
        output += `${info.icon} ${entry.label} — ${entry.body.substring(0, 60)}${entry.body.length > 60 ? '...' : ''}\n`;
    }
    return output;
};

// ============================================================
// PROCESS COMMAND
// ============================================================
async function processCommand(input) {
    if (!input.trim()) return;
    
    // User spoke - interrupt dream
    DreamPulse.onUserInput();
    
    // Check for add command
    if (input.toLowerCase().startsWith('add ')) {
        const result = await commands.add(null, input);
        if (result) printLine(result);
        return;
    }
    
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    
    if (!commands[cmd]) {
        printLine(`Unknown command: ${cmd}. Type 'help' for available commands.`);
        return;
    }
    
    try {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
    } catch (err) {
        printLine(`Error: ${err.message}`);
    }
}

window.addEventListener('DOMContentLoaded', async () => {
    const input = document.getElementById('command');
    
    if (!window.supabase) {
        printLine('ERROR: Supabase client not loaded');
        return;
    }
    
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    printLine('Kairos Terminal v3.1 — Dream Pulse');
    printLine('✓ Connected to Supabase');
    printLine('✓ 7 Divine Bands: ✈️ → ☀️ → 🔥 → 🌾 → 🌊 → 🦉 → ⚡');
    printLine('✓ The terminal dreams when idle for 30 seconds');
    printLine('');
    printLine('Try: add ealdforn: The ancient one carries the stolen heart');
    printLine('');
    
    // Start dream pulse engine
    DreamPulse.start();
    
    // Update dream status periodically
    setInterval(() => {
        if (DreamPulse.state !== 'thundering') {
            DreamPulse.updateDreamStatus();
        }
    }, 1000);
    
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value;
            if (val.trim()) {
                printLine(`> ${val}`);
                processCommand(val);
                commandHistory.push(val);
                historyIndex = commandHistory.length;
            }
            input.value = '';
        }
        
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = commandHistory[historyIndex];
            }
        }
        
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                input.value = commandHistory[historyIndex];
            } else if (historyIndex === commandHistory.length - 1) {
                historyIndex++;
                input.value = '';
            }
        }
    });
    
    input.focus();
});
