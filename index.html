<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Terminal · MVP Kernel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      padding: 1.5rem;
    }

    .kairos-terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.9rem 1.4rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .node-badge {
      color: #6c8b9f;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .status-led {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .terminal-output div {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.25rem;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.8rem 1.2rem;
    }

    .prompt-symbol {
      color: #7aa2c7;
      font-weight: 600;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.95rem;
      outline: none;
      padding: 0.3rem 0;
    }

    .footer-hint {
      background: #03050780;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.35rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="kairos-terminal">
  <div class="terminal-header">
    <div class="node-badge">
      <span>⚡ KERNEL NODE #1</span> <strong>· DEEPSEEK</strong>
    </div>
    <div class="status-led">
      <span class="led"></span>
      <span>supabase ready</span>
    </div>
  </div>

  <div id="terminal" class="terminal-output">
    <div>Kairos Terminal v1.0 - Initializing...</div>
  </div>

  <div class="input-line">
    <span class="prompt-symbol">➜</span>
    <input type="text" id="command" placeholder="type 'help' and press Enter" autofocus spellcheck="false" autocomplete="off">
  </div>
  <div class="footer-hint">
    commands: help, clear, schema, insert, query, random, forgotten
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let supabase = null;
const commands = {};
let commandHistory = [];
let historyIndex = -1;

// ===============================
// OUTPUT SYSTEM (Typing effect)
// ===============================
async function typeLine(text, speed = 8) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  terminal.appendChild(line);

  for (let i = 0; i < text.length; i++) {
    line.textContent += text[i];
    await new Promise(r => setTimeout(r, speed));
  }

  terminal.scrollTop = terminal.scrollHeight;
}

function printLine(text) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  line.textContent = text;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

// ===============================
// PARSER (Aion-lite)
// ===============================
function parseCommand(input) {
  const cmd = input.split(' ')[0];
  const rest = input.slice(cmd.length).trim();
  return { cmd: cmd.toLowerCase(), rest };
}

// ===============================
// PROCESS COMMAND
// ===============================
async function processCommand(input) {
  if (!input.trim()) return;

  const { cmd, rest } = parseCommand(input);

  if (!commands[cmd]) {
    return typeLine(`Unknown command: ${cmd}`);
  }

  try {
    const result = await commands[cmd](rest);
    if (result) await typeLine(result);
  } catch (err) {
    await typeLine(`Error: ${err.message}`);
  }
}

// ===============================
// COMMANDS
// ===============================
commands.help = async () => {
  return `Commands:
help
clear
schema
insert <table> <json>
query <table> key=value key=value
random
forgotten
weave <id>`;
};

commands.clear = async () => {
  document.getElementById('terminal').innerHTML = '';
};

commands.insert = async (rest) => {
  const firstSpace = rest.indexOf(' ');
  if (firstSpace === -1) return 'Usage: insert <table> <json>';

  const table = rest.slice(0, firstSpace);
  const jsonStr = rest.slice(firstSpace + 1);

  let data;
  try {
    data = JSON.parse(jsonStr);
  } catch {
    return 'Invalid JSON';
  }

  // AION VALIDATION LAYER
  if (!data.label || !data.body) {
    return 'Insert requires: label + body';
  }

  const { error } = await supabase.from(table).insert(data);
  if (error) return error.message;

  return `✓ inserted into ${table}`;
};

commands.query = async (rest) => {
  const parts = rest.split(' ');
  const table = parts[0];
  let query = supabase.from(table).select('*');

  for (let i = 1; i < parts.length; i++) {
    if (parts[i].includes('=')) {
      const [k, v] = parts[i].split('=');
      query = query.eq(k, v);
    }
  }

  const { data, error } = await query;
  if (error) return error.message;
  if (!data.length) return 'No results';

  return data.map(d => JSON.stringify(d)).join('\n');
};

commands.random = async () => {
  const { data } = await supabase.from('entries').select('*');
  if (!data.length) return 'No entries';

  const r = data[Math.floor(Math.random() * data.length)];
  return JSON.stringify(r, null, 2);
};

commands.forgotten = async () => {
  const { data: entries } = await supabase.from('entries').select('id,label');
  const { data: rel } = await supabase.from('relationships').select('source_id');

  const used = new Set(rel.map(r => r.source_id));
  const lost = entries.filter(e => !used.has(e.id));

  return lost.map(e => `- ${e.label}`).join('\n') || 'None';
};

// ===============================
// NEW: WEAVE (graph traversal)
// ===============================
commands.weave = async (rest) => {
  if (!rest) return 'Usage: weave <id>';

  const { data: rel } = await supabase
    .from('relationships')
    .select('*')
    .eq('source_id', rest);

  if (!rel.length) return 'No connections';

  const ids = rel.map(r => r.target_id);

  const { data: entries } = await supabase
    .from('entries')
    .select('*')
    .in('id', ids);

  return entries.map(e => `→ ${e.label}`).join('\n');
};

// ===============================
// INIT
// ===============================
window.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('command');

  supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  printLine('Kairos Terminal v1.1');
  printLine('RLS Secure · Aion Layer Active\n');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = input.value;

      if (val.trim()) {
        printLine(`> ${val}`);
        processCommand(val);

        commandHistory.push(val);
        historyIndex = commandHistory.length;
      }

      input.value = '';
    }

    if (e.key === 'ArrowUp') {
      if (historyIndex > 0) {
        historyIndex--;
        input.value = commandHistory[historyIndex];
      }
    }

    if (e.key === 'ArrowDown') {
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        input.value = commandHistory[historyIndex];
      } else {
        input.value = '';
      }
    }
  });

  input.focus();
});
</script>
</body>
</html>
