    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }
        .spectrum-dot.active {
            opacity: 1; transform: scale(1.35);
            box-shadow: 0 0 7px currentColor;

        .spectrum-dot.rejected {
            opacity: 1; background: #c0392b !important;
            box-shadow: 0 0 10px #c0392b;
            animation: dotShake 0.35s ease;

        @keyframes dotShake {
            0%,100% { transform: scale(1.35) translateX(0); }
            30%      { transform: scale(1.35) translateX(-3px); }
            70%      { transform: scale(1.35) translateX(3px); }
        }

        .status { display: flex; align-items: center; gap: 0.45rem; color: #4a5e72; font-size: 0.62rem; }

        .led {
            width: 7px; height: 7px; border-radius: 50%;
            background: #27ae60; box-shadow: 0 0 5px #27ae60;

        .counter {
            font-size: 0.6rem; background: #0f141e;

        .output div {
            white-space: pre-wrap; word-break: break-word;
            margin-bottom: 0.1rem;

        @keyframes lineIn {
            from { opacity: 0; transform: translateX(-3px); }

        .band-zeus       { color: #b39ddb; border-left: 2px solid #7e57c2; padding-left: 0.5rem; }

        /* Zeus full body — shown on its own line, readable */
        .zeus-full {
            color: #c8b8f0;
            border-left: 3px solid #7e57c2;
            padding-left: 0.6rem;
            margin: 0.25rem 0 0.5rem 0;
            font-style: italic;
            line-height: 1.8;
            animation: thunderFlash 0.7s ease-out, lineIn 0.18s ease-out;

            0%   { text-shadow: none; }
            35%  { text-shadow: 0 0 20px #9b59b6, 0 0 40px #d4af37; color: #ffe082; }

        .dream {
            opacity: 0.7; font-style: italic; color: #9c8de0;
            border-left: 2px solid #3d2e6e; padding-left: 0.5rem;
        }

        .sys    { color: #2e3f52; }
        .sysdim { color: #1e2a38; }

        .gate-pass { color: #1e8449; border-left: 2px solid #1e8449; padding-left: 0.5rem; }
        .gate-fail {
            color: #922b21; border-left: 2px solid #922b21; padding-left: 0.5rem;

        }
        @keyframes lineShake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-4px); }
            75%      { transform: translateX(4px); }
        }

        .input-line {
            display: flex; align-items: center; gap: 0.45rem;
            background: #040608; border-top: 1px solid #111820;
            padding: 0.6rem 1rem;
        }
        .prompt { color: #4a7a9b; font-weight: 700; font-size: 0.85rem; }
        #command {
            flex: 1; background: transparent; border: none;
            color: #ddeeff; font-family: inherit;

        .footer {
            background: #030508; font-size: 0.58rem;

            border-top: 1px solid #0d1220;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.3rem;

        @media (max-width: 600px) {
            .output { font-size: 0.72rem; padding: 0.7rem 0.8rem; }
            .input-line { padding: 0.5rem 0.8rem; }
        }

<script>
// ============================================================
// KAIROS TERMINAL v4.3
// Compressed bands · semantic clusters · full terminal legibility
// No APIs. Structure + iteration + time = resonance.
// ============================================================

const SUPABASE_URL      = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db             = null;
let commandHistory = [];
let historyIndex   = -1;

// ============================================================
// BAND CONFIGURATION — 64w Zeus hard cap
// ============================================================
const DIVINE_BANDS = {
    hermes:     { index:1, icon:'✈️',  name:'Hermes',     table:'hermes_entries',     min:1,  max:2,  target:2,  time:1618, color:'#d4956a' },
    apollo:     { index:2, icon:'☀️',  name:'Apollo',     table:'apollo_entries',     min:3,  max:5,  target:4,  time:2427, color:'#c9a84c' },
    hephaestus: { index:3, icon:'🔥',  name:'Hephaestus', table:'hephaestus_entries', min:6,  max:10, target:8,  time:3236, color:'#b84a00' },
    demeter:    { index:4, icon:'🌾',  name:'Demeter',    table:'demeter_entries',    min:11, max:20, target:15, time:4045, color:'#5a7a2a' },
    poseidon:   { index:5, icon:'🌊',  name:'Poseidon',   table:'poseidon_entries',   min:21, max:35, target:28, time:4854, color:'#2a5e8a' },
    athena:     { index:6, icon:'🦉',  name:'Athena',     table:'athena_entries',     min:36, max:50, target:43, time:5663, color:'#7a3a9a', threshold:70 },
    zeus:       { index:7, icon:'⚡',  name:'Zeus',       table:'zeus_entries',       min:51, max:64, target:57, time:6472, color:'#7e57c2' }
};

const BAND_ORDER = ['hermes','apollo','hephaestus','demeter','poseidon','athena','zeus'];

function getBandFromWordCount(n) {
    if (n <= 2)  return 'hermes';
    if (n <= 5)  return 'apollo';
    if (n <= 10) return 'hephaestus';
    if (n <= 20) return 'demeter';
    if (n <= 35) return 'poseidon';
    if (n <= 50) return 'athena';
    return 'zeus';
}

// ============================================================
// SEMANTIC CLUSTERS — source of resonance
// Hermes seeds from one cluster. Chain inherits its gravity.
// ============================================================
const CLUSTERS = {
    decay:   { words: ['ash','bone','rust','dust','hollow','ruin','rot','silt','husk','marrow','splinter','char','residue','fragment','remnant'] },
    light:   { words: ['ember','threshold','dawn','signal','pulse','gleam','flicker','ignite','radiance','luminous','kindle','aureole','beacon','solstice','corona'] },
    memory:  { words: ['echo','thread','trace','residue','mark','imprint','fossil','sediment','inscription','archive','relic','refrain','palimpsest','vestige','scar'] },
    motion:  { words: ['tide','current','drift','spiral','return','surge','oscillate','cycle','recede','cascade','flux','eddy','undulate','momentum','vortex'] },
    void:    { words: ['silence','gap','absence','depth','between','hollow','abyss','lacuna','suspension','interval','pause','null','negative','liminal','recess'] },
    forge:   { words: ['iron','hammer','anvil','temper','alloy','slag','crucible','weld','smelt','quench','mold','cast','strike','fuse','reforge'] },
    myth:    { words: ['serpent','raven','phoenix','wolf','oracle','augur','sovereign','exile','wanderer','threshold','labyrinth','augury','omen','sigil','totem'] }
};
const CLUSTER_NAMES = Object.keys(CLUSTERS);

// Universal pools — structure, not theme
const SUBJECTS = [
    'The raven','The forge','An ember','The river','A threshold','The dreamer',
    'The watcher','A blade','The tide','Memory','Silence','The ancient flame',
    'A root system','The void','Dust','Iron','The gate','The oracle',
    'A hollow bone','The current','Residue','The exile'
];
const VERBS = [
    'carries','holds','breaks','remembers','forgets','burns','returns','rises',
    'fractures','echoes','consumes','reveals','dissolves','endures','recedes',
    'descends','illuminates','devours','persists','collapses','accumulates',
    'drifts','spirals','marks','inscribes','tempers','suspends'
];
const ABSTRACT = [
    'consciousness','impermanence','recursion','entropy','emergence','paradox',
    'resonance','dissolution','transcendence','fragmentation','memory','longing',
    'threshold','void','fate','wisdom','chaos','silence','truth','absence',
    'oscillation','continuity','rupture','interval','sediment','trace'
];

function rand(arr)     { return arr[Math.floor(Math.random() * arr.length)]; }
function randN(arr, n) { return [...arr].sort(() => 0.5 - Math.random()).slice(0, n); }
function wc(str)       { return str.trim().split(/\s+/).filter(Boolean).length; }
function cap(str)      { return str.charAt(0).toUpperCase() + str.slice(1); }

// ============================================================
// EVOLUTION STATE
// ============================================================
let evolutionActive  = false;
let evolutionTimer   = null;
let currentBandIndex = 0;
let currentChain     = {};
let activeCluster    = null;
let dreamSeed        = null;
let chainStats       = { runs:0, hepRejects:0, athenaRejects:0, saved:0 };

// ============================================================
// GATE FUNCTIONS
// ============================================================

// HERMES: 1–2 words. Seeds from one cluster. Sets chain gravity.
function hermesGate(seed = null) {
    if (seed && seed.cluster) {
        activeCluster = seed.cluster;
        return { body: seed.words.slice(0,2).join(' '), wordCount: seed.words.length, fromHoard: true };
    }
    activeCluster  = rand(CLUSTER_NAMES);
    const pool     = CLUSTERS[activeCluster].words;
    const count    = 1 + Math.floor(Math.random() * 2);
    const words    = randN(pool, count);
    return { body: words.join(' '), wordCount: words.length, fromHoard: false };
}

// APOLLO: 3–5 words. Extends seed within same cluster.
function apolloGate(prev) {
    const pool      = CLUSTERS[activeCluster].words;
    const seedWords = prev.body.split(/\s+/);
    const needed    = 3 + Math.floor(Math.random() * 3);
    const extra     = randN(pool.filter(w => !seedWords.includes(w)), needed - seedWords.length);
    const words     = [...seedWords, ...extra].slice(0, needed);
    words[0]        = cap(words[0]);
    return { body: words.join(' '), wordCount: words.length };
}

// HEPHAESTUS: 6–10 words. REAL S-V-O gate. Rejects chain on failure.
function hephaestusGate(prev) {
    const pool    = CLUSTERS[activeCluster] ? CLUSTERS[activeCluster].words : CLUSTERS.void.words;
    const subject = rand(SUBJECTS);
    const verb    = rand(VERBS);
    const obj     = [...prev.body.split(/\s+/), ...randN(pool, 3)].slice(0,5).join(' ').toLowerCase();
    const raw     = `${subject} ${verb} ${obj}`;
    const words   = raw.split(/\s+/).slice(0, 10);
    const body    = words.join(' ') + '.';

    const hasSubject = /^[A-Z]/.test(body);
    const hasVerb    = VERBS.some(v => body.includes(` ${v} `));
    const hasObject  = words.length >= 6;
    const inRange    = words.length >= 6 && words.length <= 10;
    const passed     = hasSubject && hasVerb && hasObject && inRange;

    return { body, wordCount: words.length, passedGate: passed,
             debug: { hasSubject, hasVerb, hasObject, inRange } };
}

// DEMETER: 11–20 words. Organic cluster growth.
function demeterGate(prev) {
    const pool  = CLUSTERS[activeCluster].words;
    let body    = prev.body.replace(/\.$/, '');
    let words   = body.split(/\s+/);

    while (words.length < 11) {
        body  = `${body}, ${randN(pool, 2).join(' ')}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 20);
    body  = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';
    return { body, wordCount: words.length };
}

// POSEIDON: 21–35 words. Depth — cluster + abstract layer.
function poseidonGate(prev) {
    const pool = CLUSTERS[activeCluster].words;
    let body   = prev.body.replace(/\.$/, '');
    let words  = body.split(/\s+/);

    const expansions = [
        () => `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(pool)} cannot contain.`,
        () => `In the space between ${rand(pool)} and ${rand(pool)}, ${rand(ABSTRACT)} accumulates.`,
        () => `Where ${rand(pool)} meets ${rand(pool)}, something ${rand(VERBS)}.`,
        () => `${rand(pool)} against ${rand(ABSTRACT)} — ${rand(SUBJECTS).toLowerCase()} ${rand(VERBS)}.`
    ];

    while (words.length < 21) {
        body  = `${body} ${rand(expansions)()}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 35);
    body  = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';
    return { body, wordCount: words.length };
}

// ATHENA: 36–50 words. REAL wisdom gate. 4 criteria × 25pts each.
// Criteria are independent of what earlier gates pre-load.
const ATHENA_THRESHOLD = 70;

function athenaGate(prev) {
    const pool = CLUSTERS[activeCluster] ? CLUSTERS[activeCluster].words : CLUSTERS.void.words;
    let body   = prev.body.replace(/[.!?]$/, '');
    let words  = body.split(/\s+/);

    while (words.length < 36) {
        const s = `${rand(SUBJECTS)} ${rand(VERBS)} ${rand(pool)} — ${rand(ABSTRACT)} without ${rand(pool)}.`;
        body  = `${body} ${s}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 50);
    body  = words.join(' ');
    if (!/[.!?—]$/.test(body)) body += '.';

    const total  = words.length;
    const unique = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g,''))).size;
    const lexDen = unique / total;

    const absCount  = ABSTRACT.filter(a => body.toLowerCase().includes(a)).length;
    const sentCount = (body.match(/[.!?]/g) || []).length;

    // Repeated trigram check — catches mechanical padding
    const trigrams = [];
    let hasPadding = false;
    for (let i = 0; i < words.length - 2; i++) {
        const tri = words.slice(i,i+3).join(' ').toLowerCase();
        if (trigrams.includes(tri)) { hasPadding = true; break; }
        trigrams.push(tri);
    }

    let score = 0;
    const bd  = {};

    if (lexDen  >= 0.72) { score += 25; bd.A = `✓ lex(${(lexDen*100).toFixed(0)}%)`; }
    else                  {              bd.A = `✗ lex(${(lexDen*100).toFixed(0)}%)`; }
    if (absCount >= 1)    { score += 25; bd.B = `✓ abs(${absCount})`; }
    else                  {              bd.B = `✗ abs(0)`; }
    if (sentCount >= 2)   { score += 25; bd.C = `✓ snt(${sentCount})`; }
    else                  {              bd.C = `✗ snt(${sentCount})`; }
    if (!hasPadding)      { score += 25; bd.D = `✓ pure`; }
    else                  {              bd.D = `✗ repeat`; }
    bd.E = total >= 36 && total <= 50 ? `✓ len(${total})` : `✗ len(${total})`;

    return { body, wordCount: total, wisdomScore: score, passedGate: score >= ATHENA_THRESHOLD, breakdown: bd };
}

// ZEUS: 51–64 words. Hard cap. Full body displayed in terminal.
function zeusGate(prev) {
    const pool = CLUSTERS[activeCluster] ? CLUSTERS[activeCluster].words : CLUSTERS.void.words;
    let body   = prev.body.replace(/[.!?—]$/, '');
    let words  = body.split(/\s+/);

    while (words.length < 51) {
        const t = `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(ABSTRACT)} conceals — ${rand(pool)}, ${rand(pool)}, the ${rand(ABSTRACT)} of ${rand(pool)}.`;
        body  = `${body} ${t}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 64);
    body  = words.join(' ');
    if (!/[.!?—]$/.test(body)) body += '.';
    return { body, wordCount: words.length };
}

// ============================================================
// EVOLUTION ENGINE
// ============================================================
async function runEvolutionStep() {
    if (!evolutionActive) return;

    const band     = BAND_ORDER[currentBandIndex];
    const bandInfo = DIVINE_BANDS[band];
    const prev     = currentChain[BAND_ORDER[currentBandIndex - 1]] || {};

    let result;
    switch (band) {
        case 'hermes':     result = hermesGate(currentChain.__seed__ || null); break;
        case 'apollo':     result = apolloGate(prev);     break;
        case 'hephaestus': result = hephaestusGate(prev); break;
        case 'demeter':    result = demeterGate(prev);    break;
        case 'poseidon':   result = poseidonGate(prev);   break;
        case 'athena':     result = athenaGate(prev);     break;
        case 'zeus':       result = zeusGate(prev);       break;
    }

    // ── HEPHAESTUS GATE ──
    if (band === 'hephaestus' && !result.passedGate) {
        chainStats.hepRejects++;
        markDotRejected(currentBandIndex);
        const d = result.debug;
        printLine(`🔥 Hephaestus rejects · S:${d.hasSubject?'✓':'✗'} V:${d.hasVerb?'✓':'✗'} O:${d.hasObject?'✓':'✗'} · chain restarts`, 'gate-fail');
        scheduleRestart(2500);
        return;
    }

    // ── ATHENA GATE ──
    if (band === 'athena') {
        if (!result.passedGate) {
            chainStats.athenaRejects++;
            markDotRejected(currentBandIndex);
            const bd = result.breakdown;
            printLine(`🦉 Athena rejects ${result.wisdomScore}% · ${bd.A} · ${bd.B} · ${bd.C} · ${bd.D} → retry Poseidon`, 'gate-fail');
            currentBandIndex = BAND_ORDER.indexOf('poseidon');
            evolutionTimer   = setTimeout(runEvolutionStep, 2000);
            return;
        }
        const bd = result.breakdown;
        printLine(`🦉 Athena accepts ${result.wisdomScore}% · ${bd.A} · ${bd.B} · ${bd.C} · ${bd.D}`, 'gate-pass');
    }

    currentChain[band] = result;

    // ── DISPLAY ──
    const clusterTag = (band === 'hermes') ? ` [${activeCluster}]` : '';
    const hoardTag   = (band === 'hermes' && result.fromHoard) ? ' 🗄' : '';
    const timeSec    = (bandInfo.time / 1000).toFixed(2);

    if (band === 'zeus') {
        // Zeus: header line + full body on next line
        printLine(`${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}φ·${timeSec}s) [${result.wordCount}w]`, band, true);
        printLine(result.body, 'zeus-full');
    } else {
        printLine(
            `${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}φ·${timeSec}s) [${result.wordCount}w]${clusterTag}${hoardTag} "${result.body}"`,
            band, true
        );
    }

    activateDot(currentBandIndex);
    currentBandIndex++;

    if (currentBandIndex >= BAND_ORDER.length) {
        chainStats.runs++;
        printLine('', null);
        printLine(`⚡ chain #${chainStats.runs} · cluster: ${activeCluster} · ${currentChain.zeus.wordCount}w · saving…`, 'sys');
        persistZeus(currentChain.zeus.body, currentChain.zeus.wordCount, activeCluster);
        scheduleRestart(4000);
    } else {
        evolutionTimer = setTimeout(runEvolutionStep, bandInfo.time);
    }
}

function scheduleRestart(delay) {
    resetDots();
    currentBandIndex = 0;
    currentChain     = {};
    evolutionTimer   = setTimeout(() => { if (evolutionActive) runEvolutionStep(); }, delay);
}

function startEvolution(seed = null) {
    if (evolutionTimer) clearTimeout(evolutionTimer);
    evolutionActive  = true;
    currentBandIndex = 0;
    currentChain     = seed ? { __seed__: seed } : {};
    runEvolutionStep();
}

function pauseEvolution() {
    evolutionActive = false;
    if (evolutionTimer) clearTimeout(evolutionTimer);
}

// ============================================================
// PERSISTENCE
// ============================================================
async function persistZeus(body, wordCount, cluster) {
    if (!db) return;
    const label = `${cluster}-${Date.now()}`;
    const { error } = await db.from('zeus_entries').insert({
        label, body, word_count: wordCount, created_at: new Date().toISOString()
    });
    if (error) {
        printLine(`   ⚠ save failed: ${error.message}`, 'sys');
    } else {
        chainStats.saved++;
        printLine(`   ✓ hoard → zeus ["${label}"]`, 'sys');
    }
}

async function getHoardSeed() {
    if (!db) return null;
    try {
        const { data, error } = await db.from('zeus_entries').select('body, label').limit(30);
        if (error || !data || !data.length) return null;

        const entry        = data[Math.floor(Math.random() * data.length)];
        const labelCluster = CLUSTER_NAMES.find(c => entry.label.startsWith(c));
        const cluster      = labelCluster || rand(CLUSTER_NAMES);
        const clusterWords = CLUSTERS[cluster].words.filter(w => entry.body.toLowerCase().includes(w));
        const words        = clusterWords.length >= 2 ? randN(clusterWords, 2) : randN(CLUSTERS[cluster].words, 2);

        return { words, cluster };
    } catch { return null; }
}

// ============================================================
// DREAM CYCLE
// ============================================================
let awakePulseCount = 0;
let pulseInterval   = null;
let isDreaming      = false;

function updateCounter() {
    const el = document.getElementById('counter');
    if (el) el.textContent = `${awakePulseCount}/30`;
}

function startAwakePulses() {
    if (pulseInterval) clearInterval(pulseInterval);
    pulseInterval = setInterval(() => {
        if (!isDreaming) { awakePulseCount++; updateCounter(); if (awakePulseCount >= 30) enterDream(); }
    }, 1618);
}

async function enterDream() {
    isDreaming = true;
    pauseEvolution();
    document.getElementById('statusLed').classList.add('dreaming');
    document.getElementById('stateLabel').textContent = 'DREAMING';
    printLine('', null);
    printLine('✦ dreaming — reaching into the hoard…', 'dream');

    const seed = await getHoardSeed();
    if (seed) {
        dreamSeed = seed;
        printLine(`  fragment: "${seed.words.join(' ')}" · cluster: ${seed.cluster}`, 'dream');
    } else {
        dreamSeed = null;
        printLine(`  hoard empty — dreaming from void`, 'dream');
    }
    setTimeout(exitDream, 7000);
}

function exitDream() {
    isDreaming      = false;
    awakePulseCount = 0;
    updateCounter();
    document.getElementById('statusLed').classList.remove('dreaming');
    document.getElementById('stateLabel').textContent = 'AWAKE';
    if (dreamSeed) {
        printLine(`✦ wakes · seeding from hoard · cluster: ${dreamSeed.cluster}`, 'dream');
    } else {
        printLine('✦ wakes · new chain begins', 'dream');
    }
    printLine('', null);
    startEvolution(dreamSeed);
    dreamSeed = null;
}

// ============================================================
// SPECTRUM DOTS
// ============================================================
function activateDot(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) { dots[i].classList.remove('rejected'); dots[i].classList.add('active'); }
}
function markDotRejected(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) {
        dots[i].classList.remove('active');
        dots[i].classList.add('rejected');
        setTimeout(() => dots[i].classList.remove('rejected'), 2200);
    }
}
function resetDots() {
    document.querySelectorAll('.spectrum-dot').forEach(d => d.classList.remove('active','rejected'));
}

// ============================================================
// OUTPUT
// ============================================================
function printLine(text, cls = null) {
    const output = document.getElementById('output');
    const line   = document.createElement('div');
    line.textContent = text;

    const direct = ['gate-pass','gate-fail','sys','sysdim','dream','zeus-full'];
    if (cls && direct.includes(cls)) {
        line.classList.add(cls);
    } else if (cls && DIVINE_BANDS[cls]) {
        line.classList.add(`band-${cls}`);
    } else if (cls && cls.startsWith('band-')) {
        line.classList.add(cls);
    }

    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// ============================================================
// CLASSIFIER — any unrecognised input
// ============================================================
function classifyInput(raw) {
    const body  = raw.trim().replace(/[?!.]+$/, '').trim();
    const words = body.split(/\s+/).filter(Boolean);
    const n     = words.length;
    const band  = getBandFromWordCount(n);
    const info  = DIVINE_BANDS[band];

    // Detect cluster resonance
    let detectedCluster = null;
    for (const [name, cluster] of Object.entries(CLUSTERS)) {
        const hits = cluster.words.filter(w => body.toLowerCase().includes(w));
        if (hits.length > 0) { detectedCluster = { name, hits }; break; }
    }

    printLine(`   ${n}w · ${info.icon} ${info.name} (${info.min}–${info.max}w)`, 'sys');
    if (detectedCluster) {
        printLine(`   cluster resonance: ${detectedCluster.name} · "${detectedCluster.hits.join(', ')}"`, 'sys');
    }

    if (band === 'hermes' || band === 'apollo') {
        printLine(`   ✓ seed eligible · no gate`, 'gate-pass');
    } else if (band === 'hephaestus') {
        const hasS = /^[A-Z]/.test(body);
        const hasV = VERBS.some(v => ` ${body} `.includes(` ${v} `));
        const hasO = n >= 6;
        const ok   = hasS && hasV && hasO;
        printLine(`   S-V-O: S:${hasS?'✓':'✗'} V:${hasV?'✓':'✗'} O:${hasO?'✓':'✗'} → ${ok?'passes':'fails'}`, ok?'gate-pass':'gate-fail');
        if (!ok) printLine(`   tip: capitalised subject + active verb + object`, 'sys');
    } else if (band === 'demeter' || band === 'poseidon') {
        printLine(`   ✓ depth band · no hard gate`, 'gate-pass');
    } else if (band === 'athena' || band === 'zeus') {
        const saved   = activeCluster;
        activeCluster = detectedCluster ? detectedCluster.name : 'void';
        const check   = athenaGate({ body });
        activeCluster = saved;
        const bd      = check.breakdown;
        printLine(`   Athena: ${check.wisdomScore}% · ${bd.A} · ${bd.B} · ${bd.C} · ${bd.D} → ${check.passedGate?'passes':'fails'}`,
            check.passedGate ? 'gate-pass' : 'gate-fail');
    }
    printLine(`   → "add <label>: ${body}" to save`, 'sysdim');
}

// ============================================================
// COMMANDS
// ============================================================
const KNOWN_COMMANDS = ['help','clear','pause','resume','stats','add','view','hoard','seed','clusters'];

const commands = {
    help: () =>
`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
KAIROS v4.3 · 64w cap · resonance engine
no apis · structure + iteration + time
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
BANDS          WORDS    GATE
─────────────────────────────────────────────
✈️  Hermes      1–2      cluster seed
☀️  Apollo      3–5      cluster syntax
🔥  Hephaestus  6–10     S-V-O (rejects chain)
🌾  Demeter     11–20    phrase growth
🌊  Poseidon    21–35    depth expansion
🦉  Athena      36–50    wisdom ≥ 70%
⚡  Zeus        51–64    thunder · hard cap · saves

COMMANDS
  help · clear · pause · resume
  stats · hoard · clusters
  view <band> [n]       browse hoard entries
  seed <words>          inject seed into chain
  add <label>: <body>   save entry to hoard

NATURAL INPUT → classified by word count + gate
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,

    clear:   () => { document.getElementById('output').innerHTML = ''; return null; },
    pause:   () => { pauseEvolution(); return '⏸ paused'; },
    resume:  () => { if (!evolutionActive) { startEvolution(); return '▶ resumed'; } return 'already running'; },

    clusters: () => {
        let out = `semantic clusters · chain gravity\n`;
        for (const [name, c] of Object.entries(CLUSTERS)) {
            out += `\n  ${name.padEnd(8)} ${c.words.slice(0,7).join(' · ')}`;
        }
        return out;
    },

    stats: async () => {
        let total = 0;
        for (const b of BAND_ORDER) {
            const { count } = await db.from(DIVINE_BANDS[b].table).select('*',{count:'exact',head:true});
            total += (count || 0);
        }
        return `session stats
  chains completed : ${chainStats.runs}
  zeus entries saved: ${chainStats.saved}
  hephaestus rejects: ${chainStats.hepRejects}
  athena rejects   : ${chainStats.athenaRejects}
  total hoard size : ${total} entries`;
    },

    hoard: async () => {
        let out = `🗄 hoard\n`;
        for (const b of BAND_ORDER) {
            const info = DIVINE_BANDS[b];
            const { count } = await db.from(info.table).select('*',{count:'exact',head:true});
            const n   = count || 0;
            const bar = '█'.repeat(Math.min(n, 20));
            out += `  ${info.icon} ${info.name.padEnd(12)} ${String(n).padStart(3)}  ${bar}\n`;
        }
        return out;
    },

    view: async (args) => {
        const band = args[0]?.toLowerCase();
        const n    = Math.min(parseInt(args[1]) || 3, 10);
        if (!band || !DIVINE_BANDS[band])
            return `usage: view <band> [n]\nbands: ${BAND_ORDER.join(', ')}`;
        const info = DIVINE_BANDS[band];
        const { data, error } = await db.from(info.table)
            .select('label, body, word_count, created_at')
            .order('created_at', { ascending: false })
            .limit(n);
        if (error)                 return `error: ${error.message}`;
        if (!data || !data.length) return `${info.icon} ${info.name} hoard empty`;
        let out = `${info.icon} ${info.name} · ${data.length} recent\n`;
        data.forEach((e,i) => { out += `\n[${i+1}] ${e.label} (${e.word_count}w)\n${e.body}\n`; });
        return out;
    },

    seed: (args, fullInput) => {
        const s = fullInput.replace(/^seed\s*/i,'').trim();
        if (!s) return 'usage: seed <words>';
        let cluster = null;
        for (const [name, c] of Object.entries(CLUSTERS)) {
            if (c.words.some(w => s.toLowerCase().includes(w))) { cluster = name; break; }
        }
        cluster     = cluster || rand(CLUSTER_NAMES);
        const words = s.split(/\s+/).slice(0,2);
        startEvolution({ words, cluster });
        return `▶ seeded: "${words.join(' ')}" · cluster: ${cluster}`;
    },

    add: async (args, fullInput) => {
        const match = fullInput.match(/^add\s+([^:]+):\s*(.+)$/i);
        if (!match) return 'usage: add <label>: <body>';
        const label = match[1].trim();
        const body  = match[2].trim();
        const n     = wc(body);
        const band  = getBandFromWordCount(n);
        const info  = DIVINE_BANDS[band];

        if (band === 'hephaestus') {
            const check = hephaestusGate({ body });
            if (!check.passedGate) return `🔥 Hephaestus rejects — no S-V-O`;
        }
        if (band === 'athena' || band === 'zeus') {
            const saved   = activeCluster;
            activeCluster = 'void';
            const check   = athenaGate({ body });
            activeCluster = saved;
            if (!check.passedGate)
                return `🦉 Athena rejects ${check.wisdomScore}% · ${check.breakdown.A} · ${check.breakdown.B} · ${check.breakdown.C} · ${check.breakdown.D}`;
        }
        const { error } = await db.from(info.table).insert({
            label, body, word_count: n, created_at: new Date().toISOString()
        });
        if (error) return `error: ${error.message}`;
        chainStats.saved++;
        return `✓ "${label}" → ${info.icon} ${info.name} [${n}w]`;
    }
};

// ============================================================
// COMMAND PROCESSOR
// ============================================================
async function processCommand(input) {
    if (!input.trim()) return;
    awakePulseCount = 0;
    updateCounter();
    const parts = input.trim().split(/\s+/);
    const cmd   = parts[0].toLowerCase();
    const args  = parts.slice(1);

    if (KNOWN_COMMANDS.includes(cmd)) {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
        return;
    }
    classifyInput(input);
}

    startEvolution();
    startAwakePulses();

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value.trim();
            if (val) {
                printLine(`➜ ${val}`, 'sys');
                processCommand(val);
                commandHistory.push(val);
                historyIndex = commandHistory.length;
            }
            input.value = '';
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) { historyIndex--; input.value = commandHistory[historyIndex]; }
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++; input.value = commandHistory[historyIndex];
            } else { historyIndex = commandHistory.length; input.value = ''; }
        }
    });

    input.focus();
});
