<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Terminal · Hare-Heart Hoard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      padding: 1.5rem;
    }

    .kairos-terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.9rem 1.4rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .node-badge {
      color: #6c8b9f;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .status-led {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .terminal-output div {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.25rem;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.8rem 1.2rem;
    }

    .prompt-symbol {
      color: #7aa2c7;
      font-weight: 600;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.95rem;
      outline: none;
      padding: 0.3rem 0;
    }

    .footer-hint {
      background: #03050780;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.35rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="kairos-terminal">
  <div class="terminal-header">
    <div class="node-badge">
      <span>⚡ KERNEL NODE #1</span> <strong>· HARE-HEART HOARD</strong>
    </div>
    <div class="status-led">
      <span class="led"></span>
      <span>supabase ready</span>
    </div>
  </div>

  <div id="terminal" class="terminal-output">
    <div>Kairos Terminal v1.1 - Hare-Heart Hoard</div>
  </div>

  <div class="input-line">
    <span class="prompt-symbol">➜</span>
    <input type="text" id="command" placeholder="type 'help' for commands | 'list 1' for first page" autofocus spellcheck="false" autocomplete="off">
  </div>
  <div class="footer-hint">
    📜 commands: help, list [page], count, search, insert, query, random, forgotten, weave, stats | ↑ history
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db = null;
const commands = {};
let commandHistory = [];
let historyIndex = -1;

function printLine(text) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  line.textContent = text;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

function parseCommand(input) {
  const parts = input.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  return { cmd, args, rest: args.join(' ') };
}

async function processCommand(input) {
  if (!input.trim()) return;
  
  const { cmd, args, rest } = parseCommand(input);
  
  if (!commands[cmd]) {
    printLine(`Unknown command: ${cmd}. Type 'help' for available commands.`);
    return;
  }
  
  try {
    const result = await commands[cmd](args, rest);
    if (result) {
      if (typeof result === 'string' && result.includes('\n')) {
        result.split('\n').forEach(line => printLine(line));
      } else {
        printLine(result);
      }
    }
  } catch (err) {
    printLine(`Error: ${err.message}`);
  }
}

// ===============================
// COMMAND HANDLERS (UPDATED WITH PAGINATION)
// ===============================

commands.help = async () => {
  return `Available Commands:
  help        - Show this help message
  clear       - Clear terminal output
  schema      - Show table structure
  list [page] - List entries (20 per page). Example: list 1, list 2
  count       - Show total number of entries
  search <text> - Search entries by label or body
  insert <json> - Insert entry (example: insert {"label":"test","body":"hello"})
  query [filter] - Query entries (example: query label=ashen_fragment)
  random      - Get random entry
  forgotten   - Show entries with no relationships
  weave <label> - Show connections from an entry label
  stats       - Show database statistics`;
};

commands.clear = async () => {
  document.getElementById('terminal').innerHTML = '';
  return null;
};

commands.schema = async () => {
  let output = 'Terminal Database Schema:\n\n';
  
  try {
    const { data, error } = await db.from('terminal_entries').select('*').limit(1);
    if (error) throw error;
    if (data && data.length > 0) {
      output += `✓ terminal_entries: ${Object.keys(data[0]).join(', ')}\n`;
    } else {
      output += `✓ terminal_entries: (empty table)\n`;
    }
  } catch (err) {
    output += `❌ terminal_entries: ${err.message}\n`;
  }
  
  try {
    const { data, error } = await db.from('terminal_relationships').select('*').limit(1);
    if (error) throw error;
    if (data && data.length > 0) {
      output += `✓ terminal_relationships: ${Object.keys(data[0]).join(', ')}\n`;
    } else {
      output += `✓ terminal_relationships: (empty table)\n`;
    }
  } catch (err) {
    output += `❌ terminal_relationships: ${err.message}\n`;
  }
  
  return output;
};

commands.count = async () => {
  const { count, error } = await db
    .from('terminal_entries')
    .select('*', { count: 'exact', head: true });
  
  if (error) return `Error: ${error.message}`;
  
  const { count: relCount } = await db
    .from('terminal_relationships')
    .select('*', { count: 'exact', head: true });
  
  return `📊 Database Summary:
  Terminal Entries: ${count}
  Terminal Relationships: ${relCount || 0}
  
💡 Use "list 1" to browse entries (20 per page)`;
};

commands.search = async (args) => {
  const searchTerm = args.join(' ');
  if (!searchTerm) return 'Usage: search <text>';
  
  const { data, error } = await db
    .from('terminal_entries')
    .select('*')
    .or(`label.ilike.%${searchTerm}%,body.ilike.%${searchTerm}%`)
    .limit(50);
  
  if (error) return `Error: ${error.message}`;
  if (!data || data.length === 0) return `No matches found for "${searchTerm}"`;
  
  let output = `🔍 Found ${data.length} matches for "${searchTerm}":\n\n`;
  data.forEach(entry => {
    output += `📝 ${entry.label}\n   ${entry.body?.substring(0, 80) || 'no body'}\n\n`;
  });
  
  if (data.length === 50) {
    output += `\n💡 Showing first 50 matches. Try a more specific search.`;
  }
  
  return output;
};

commands.list = async (args) => {
  let page = 1;
  let limit = 20;
  
  if (args.length > 0 && !isNaN(parseInt(args[0]))) {
    page = parseInt(args[0]);
  }
  
  const offset = (page - 1) * limit;
  
  const { count, error: countError } = await db
    .from('terminal_entries')
    .select('*', { count: 'exact', head: true });
  
  if (countError) return `Error: ${countError.message}`;
  if (count === 0) return 'No entries found.';
  
  const totalPages = Math.ceil(count / limit);
  
  if (page > totalPages) {
    return `Page ${page} doesn't exist. Total pages: ${totalPages}. Use "list 1" to start.`;
  }
  
  const { data, error } = await db
    .from('terminal_entries')
    .select('*')
    .order('created_at', { ascending: false })
    .range(offset, offset + limit - 1);
  
  if (error) return `Error: ${error.message}`;
  
  let output = `📋 Page ${page}/${totalPages} (${count} total entries):\n\n`;
  
  data.forEach((entry, idx) => {
    const num = offset + idx + 1;
    const bodyPreview = entry.body?.substring(0, 50) || '—';
    output += `${num}. ${entry.label}\n   ${bodyPreview}${entry.body?.length > 50 ? '...' : ''}\n`;
  });
  
  output += `\n💡 Commands: "list ${page + 1}" (next), "list ${page - 1}" (prev), "search <term>" (find), "random" (surprise)`;
  return output;
};

commands.insert = async (args) => {
  if (args.length === 0) return 'Usage: insert {"label":"name","body":"content"}';
  
  const jsonStr = args.join(' ');
  try {
    const data = JSON.parse(jsonStr);
    if (!data.label) return 'Error: "label" field is required';
    if (!data.body) data.body = '';
    
    const { error } = await db.from('terminal_entries').insert(data);
    if (error) throw error;
    return `✓ Inserted entry with label: ${data.label}`;
  } catch (err) {
    return `Insert error: ${err.message}\nExample: insert {"label":"my_node","body":"some content"}`;
  }
};

commands.query = async (args) => {
  if (args.length === 0) {
    const { data, error } = await db.from('terminal_entries').select('*').limit(20);
    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return 'No entries found';
    return data.map(row => `${row.label}: ${row.body?.substring(0, 60) || 'no body'}`).join('\n');
  }
  
  const filter = args[0];
  if (!filter.includes('=')) return 'Usage: query label=value';
  
  const [key, value] = filter.split('=');
  if (key !== 'label') return 'Only label filtering is supported';
  
  const { data, error } = await db.from('terminal_entries').select('*').eq('label', value);
  if (error) return `Error: ${error.message}`;
  if (!data || data.length === 0) return `No entry found with label: ${value}`;
  
  return data.map(row => `Label: ${row.label}\nID: ${row.id}\nBody: ${row.body}\nCreated: ${row.created_at}`).join('\n---\n');
};

commands.random = async () => {
  const { data, error } = await db.from('terminal_entries').select('*');
  if (error) return `Error: ${error.message}`;
  if (!data || data.length === 0) return 'No entries found. Insert some data first.';
  
  const random = data[Math.floor(Math.random() * data.length)];
  return `🎲 Random Entry:\nLabel: ${random.label}\nID: ${random.id}\nBody: ${random.body}\nCreated: ${random.created_at}`;
};

commands.forgotten = async () => {
  try {
    const { data: entries, error: entriesError } = await db.from('terminal_entries').select('id, label, body');
    if (entriesError) return `Error: ${entriesError.message}`;
    if (!entries || entries.length === 0) return 'No entries found.';
    
    const { data: relations, error: relError } = await db.from('terminal_relationships').select('source_id');
    if (relError && !relError.message.includes('does not exist')) {
      return `Error checking relationships: ${relError.message}`;
    }
    
    const usedIds = new Set((relations || []).map(r => r.source_id));
    const forgotten = entries.filter(e => !usedIds.has(e.id));
    
    if (forgotten.length === 0) return 'No forgotten entries found. All entries have relationships.';
    
    let output = `🌑 Forgotten Entries (${forgotten.length}):\n`;
    forgotten.slice(0, 20).forEach(e => {
      output += `  - ${e.label}: ${e.body ? e.body.substring(0, 50) : 'no body'}\n`;
    });
    if (forgotten.length > 20) output += `\n  ... and ${forgotten.length - 20} more.`;
    return output;
  } catch (err) {
    return `Error: ${err.message}`;
  }
};

commands.weave = async (args) => {
  if (args.length === 0) return 'Usage: weave <label>';
  
  const label = args[0];
  
  try {
    const { data: entry, error: entryError } = await db
      .from('terminal_entries')
      .select('id, label')
      .eq('label', label)
      .single();
    
    if (entryError) return `Entry not found: ${label}`;
    
    const { data: rel, error: relError } = await db
      .from('terminal_relationships')
      .select('target_id, type')
      .eq('source_id', entry.id);
    
    if (relError) return `Error: ${relError.message}`;
    if (!rel || rel.length === 0) return `No connections found for "${label}".`;
    
    const targetIds = rel.map(r => r.target_id);
    const { data: targets, error: targetsError } = await db
      .from('terminal_entries')
      .select('label, body')
      .in('id', targetIds);
    
    if (targetsError) return `Error: ${targetsError.message}`;
    
    let output = `🔗 Connections from "${label}":\n`;
    targets.forEach((target, idx) => {
      output += `  → ${target.label} (${rel[idx].type})\n`;
      if (target.body) output += `    "${target.body.substring(0, 60)}"\n`;
    });
    return output;
  } catch (err) {
    return `Error: ${err.message}`;
  }
};

commands.stats = async () => {
  const { count: entryCount, error: entryError } = await db.from('terminal_entries').select('*', { count: 'exact', head: true });
  if (entryError) return `Error: ${entryError.message}`;
  
  const { count: relCount, error: relError } = await db.from('terminal_relationships').select('*', { count: 'exact', head: true });
  if (relError && !relError.message.includes('does not exist')) return `Error: ${relError.message}`;
  
  return `📊 Database Statistics:\n\nTerminal Entries: ${entryCount}\nTerminal Relationships: ${relCount || 0}\n\n💡 Type "list 1" to browse entries.`;
};

// ===============================
// INITIALIZATION
// ===============================
window.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('command');
  
  if (!window.supabase) {
    printLine('ERROR: Supabase client not loaded');
    return;
  }
  
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  printLine('Kairos Terminal v1.1 - Hare-Heart Hoard');
  printLine('✓ Connected to Supabase');
  printLine('✓ Pagination enabled (20 entries per page)');
  printLine('✓ Search functionality active');
  printLine('');
  printLine('Type "help" to see available commands\n');
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = input.value;
      
      if (val.trim()) {
        printLine(`> ${val}`);
        processCommand(val);
        
        commandHistory.push(val);
        historyIndex = commandHistory.length;
      }
      
      input.value = '';
    }
    
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = commandHistory[historyIndex];
      }
    }
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        input.value = commandHistory[historyIndex];
      } else if (historyIndex === commandHistory.length - 1) {
        historyIndex++;
        input.value = '';
      }
    }
  });
  
  input.focus();
});
</script>
</body>
</html>
